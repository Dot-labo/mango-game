<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Type Quest — SAKURA KIDS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#06071a;color:#fff;
  font-family:'Segoe UI',system-ui,sans-serif}
#bgC{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
#flash{position:fixed;inset:0;pointer-events:none;z-index:80;opacity:0}

/* ── SCREENS ────────────────────────────────────── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;z-index:10;transition:opacity .3s;overflow-y:auto;padding:1.5rem 1rem}
.screen.hidden{opacity:0;pointer-events:none}

/* ── TITLE ──────────────────────────────────────── */
.logo{font-size:3.2rem;font-weight:900;letter-spacing:.04em;
  background:linear-gradient(135deg,#a78bfa 0%,#60a5fa 50%,#4ade80 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;line-height:1.1}
.logo-sub{color:#555;font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;
  margin:.4rem 0 2rem;text-align:center}
.course-grid{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;margin:0 0 1.5rem}
.course-card{width:162px;padding:1.8rem 1rem;text-align:center;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:20px;cursor:pointer;transition:all .2s}
.course-card:hover{transform:translateY(-8px);background:rgba(124,58,237,.15);
  border-color:rgba(124,58,237,.5);box-shadow:0 12px 40px rgba(124,58,237,.25)}
.course-icon{font-size:2.6rem;margin-bottom:.5rem}
.course-name{font-weight:800;font-size:1rem;margin-bottom:.25rem}
.course-desc{font-size:.67rem;color:#555;line-height:1.4}
.btn-home{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.3);color:#fff;
  border-radius:40px;padding:.45rem 1.3rem;font-size:.8rem;font-weight:700;
  cursor:pointer;text-decoration:none;display:inline-block}

/* ── STAGE SELECT ───────────────────────────────── */
.screen-title{font-size:1.25rem;font-weight:700;color:#ccc;margin-bottom:.25rem;text-align:center}
.stage-grid{display:flex;gap:.85rem;flex-wrap:wrap;justify-content:center;
  margin:.8rem 0;max-width:720px}
.stage-card{width:176px;padding:1.1rem;text-align:center;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:15px;cursor:pointer;transition:all .2s}
.stage-card:hover{transform:translateY(-5px)}
.stage-icon{font-size:2rem;margin-bottom:.3rem}
.stage-name{font-weight:700;font-size:.86rem;margin-bottom:.2rem}
.stage-desc{font-size:.64rem;color:#555;line-height:1.4}
.stage-target{font-size:.6rem;margin-top:.3rem;font-weight:600}
.btn-back{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#888;
  border-radius:30px;padding:.4rem 1rem;font-size:.78rem;cursor:pointer;font-weight:600}

/* ── HUD ─────────────────────────────────────────── */
#gameScreen{justify-content:flex-start}
#hud{width:100%;padding:.45rem 1rem;display:flex;align-items:center;gap:.7rem;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:20;flex-shrink:0;min-height:46px}
#scoreEl{font-size:1.05rem;font-weight:900;color:#fcd34d;min-width:68px}
#wpmEl{font-size:.72rem;font-weight:700;color:#60a5fa;min-width:58px}
#accEl{font-size:.72rem;font-weight:700;color:#4ade80;min-width:50px}
.hud-sep{flex:1}
#timerEl{font-size:1rem;font-weight:700;min-width:34px;text-align:right}
.hud-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:#888;
  border-radius:8px;padding:.3rem .55rem;font-size:.78rem;cursor:pointer;font-weight:700}

/* ── GAME AREA ───────────────────────────────────── */
#gameArea{flex:1;width:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:.6rem 1rem;gap:.55rem;min-height:0}
#stageLabel{font-size:.63rem;color:#333;letter-spacing:.18em;text-transform:uppercase}
#wordEmoji{font-size:2.4rem;min-height:2.9rem;text-align:center;line-height:1.2}
#wordHint{font-size:1.65rem;color:#c4b5fd;font-weight:700;min-height:2.2rem;
  text-align:center;line-height:1;max-width:90vw}
#typingDisplay{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;
  gap:.05em;font-size:2rem;font-weight:700;font-family:'Courier New',monospace;
  letter-spacing:.1em;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:14px;
  padding:.7rem 1.2rem;min-width:260px;max-width:92vw;min-height:3.8rem}
.ch{transition:color .1s,background .1s;color:#222;user-select:none}
.ch.done{color:#4ade80}
.ch.cur{color:#fff;background:rgba(124,58,237,.45);border-radius:3px;
  animation:blink .9s ease-in-out infinite}
.ch.miss{color:#f87171;animation:shk .25s ease}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
#progressWrap{width:100%;max-width:300px;height:4px;background:rgba(255,255,255,.05);
  border-radius:2px;overflow:hidden}
#progressBar{height:100%;background:linear-gradient(90deg,#7c3aed,#4ade80);
  width:0%;transition:width .3s}
#wordCount{font-size:.65rem;color:#333;letter-spacing:.08em}
#fingerLabel{font-size:.77rem;color:#a78bfa;font-weight:600;text-align:center;
  min-height:1rem;letter-spacing:.04em}

/* ── HAND GUIDE ──────────────────────────────────── */
#handGuide{display:flex;gap:2rem;align-items:flex-end;justify-content:center;
  padding:.3rem 0 .4rem;flex-shrink:0}
#handGuide svg{overflow:visible}
.finger{transition:filter .12s}
.fng-rect{transition:fill .12s}
@keyframes homeGlow{0%,100%{opacity:.3}50%{opacity:.95}}
.home-dot{animation:homeGlow 1.8s ease-in-out infinite}

/* ── ITEM LAYER ──────────────────────────────────── */
#itemLayer{position:fixed;top:56px;right:.8rem;display:flex;flex-direction:column;
  gap:.35rem;z-index:60;pointer-events:none;align-items:flex-end}
.item-pop{display:flex;align-items:center;gap:.35rem;
  background:rgba(15,8,35,.93);border:1px solid rgba(124,58,237,.5);
  border-radius:9px;padding:.4rem .8rem;font-size:.8rem;font-weight:700;color:#c4b5fd;
  animation:iPop .35s ease,iFade .35s ease 1.65s forwards}
@keyframes iPop{from{transform:translateX(80px);opacity:0}to{transform:none;opacity:1}}
@keyframes iFade{to{opacity:0;transform:translateY(-8px)}}

/* ── COMBO POPUP ─────────────────────────────────── */
.combo-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:2.4rem;font-weight:900;color:#fcd34d;pointer-events:none;z-index:70;
  animation:comboPop .65s ease forwards;
  text-shadow:0 0 24px rgba(252,211,77,.75),0 0 60px rgba(252,211,77,.3)}
@keyframes comboPop{0%{transform:translate(-50%,-50%) scale(.5);opacity:0}
  35%{transform:translate(-50%,-50%) scale(1.2);opacity:1}
  100%{transform:translate(-50%,-68%) scale(1);opacity:0}}

/* ── RESULT ──────────────────────────────────────── */
.result-title{font-size:2.4rem;font-weight:900;
  background:linear-gradient(135deg,#fcd34d,#f97316);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-sub{font-size:.72rem;color:#333;letter-spacing:.15em;margin-bottom:.8rem}
.stat-row{display:flex;gap:.9rem;flex-wrap:wrap;justify-content:center;margin:.4rem 0}
.stat-box{text-align:center;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:.6rem 1rem}
.stat-val{font-size:1.5rem;font-weight:900;color:#fcd34d}
.stat-lbl{font-size:.6rem;color:#444;margin-top:.15rem;letter-spacing:.06em}
.items-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:12px;padding:.85rem;width:100%;max-width:380px;margin:.4rem 0}
.items-box-ttl{font-size:.68rem;color:#555;letter-spacing:.12em;margin-bottom:.5rem;
  text-transform:uppercase}
.items-chips{display:flex;flex-wrap:wrap;gap:.4rem}
.item-chip{display:flex;align-items:center;gap:.3rem;
  background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);
  border-radius:7px;padding:.3rem .65rem;font-size:.79rem;font-weight:700}
.craft-hint{font-size:.7rem;color:#7c3aed;margin-top:.55rem;text-align:center}
.result-btns{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center;margin-top:.6rem}

/* ── ITEM REVEAL OVERLAY ─────────────────── */
#revealOverlay{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:rgba(2,1,20,.96);
  backdrop-filter:blur(6px)}
#revealOverlay.hidden{display:none}
.reveal-header{font-size:.82rem;color:#a78bfa;letter-spacing:.22em;text-transform:uppercase;
  margin-bottom:1.2rem;animation:rvPulse 1.4s ease-in-out infinite}
@keyframes rvPulse{0%,100%{opacity:.6}50%{opacity:1}}
.reveal-card{display:flex;flex-direction:column;align-items:center;gap:.6rem;
  animation:rvPop .55s cubic-bezier(.34,1.56,.64,1)}
@keyframes rvPop{from{transform:scale(.4) translateY(60px);opacity:0}to{transform:none;opacity:1}}
.rv-rarity{display:flex;gap:.18rem;font-size:1.2rem;margin-bottom:.2rem}
.rv-star{opacity:.22;transition:opacity .25s}
.rv-star.lit{opacity:1}
.rv-emoji{font-size:7.5rem;line-height:1;filter:drop-shadow(0 0 40px var(--ic,#fff));
  animation:rvBounce 1.2s ease-in-out infinite}
@keyframes rvBounce{0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-14px) scale(1.07)}}
.rv-name{font-size:2.5rem;font-weight:900;color:var(--ic,#fff);
  text-shadow:0 0 40px var(--ic,#fff),0 0 80px var(--ic,#fff33);
  animation:rvGlow 1.5s ease-in-out infinite}
@keyframes rvGlow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
.rv-desc{font-size:1rem;color:#888;margin-top:-.2rem}
.rv-get{font-size:1.5rem;font-weight:900;color:#fcd34d;
  text-shadow:0 0 20px rgba(252,211,77,.8);animation:rvPulse 1s ease-in-out infinite}
.rv-cnt{font-size:.72rem;color:#555;margin-top:.1rem}
.rv-next{margin-top:1.6rem;background:rgba(255,255,255,.08);
  border:1.5px solid rgba(255,255,255,.25);color:#fff;
  border-radius:40px;padding:.65rem 2rem;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:all .18s;letter-spacing:.08em}
.rv-next:hover{background:rgba(255,255,255,.18);transform:scale(1.05)}
/* Particles */
.rv-particles{position:fixed;inset:0;pointer-events:none;z-index:301;overflow:hidden}
.rv-p{position:absolute;border-radius:50%;animation:rvFall linear forwards}
@keyframes rvFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<canvas id="bgC"></canvas>
<div id="flash"></div>
<div id="itemLayer"></div>

<!-- ═══ ITEM REVEAL OVERLAY ════════════════════════════════════════════ -->
<div id="revealOverlay" class="hidden">
  <div class="rv-particles" id="rvParticles"></div>
  <div class="reveal-header">✨ アイテムゲット ✨</div>
  <div class="reveal-card" id="revealCard"></div>
</div>

<!-- ═══ TITLE ════════════════════════════════════════════════════════ -->
<div id="titleScreen" class="screen">
  <div class="logo">Type Quest</div>
  <div class="logo-sub">タイピング冒険の旅へ</div>
  <div class="course-grid">
    <div class="course-card" onclick="selectCourse('english')">
      <div class="course-icon">🌍</div>
      <div class="course-name">English World</div>
      <div class="course-desc">英語タイピングを<br>楽しく学ぼう</div>
    </div>
    <div class="course-card" onclick="selectCourse('coding')">
      <div class="course-icon">💻</div>
      <div class="course-name">Coding Lab</div>
      <div class="course-desc">プログラミング記号を<br>マスターしよう</div>
    </div>
  </div>
  <a href="index.html" class="btn-home">🏠 ホームに戻る</a>
</div>

<!-- ═══ STAGE SELECT ══════════════════════════════════════════════════ -->
<div id="stageScreen" class="screen hidden">
  <div class="screen-title" id="stageTitle"></div>
  <div class="logo-sub" id="stageSubTitle" style="margin-bottom:.8rem"></div>
  <div class="stage-grid" id="stageGrid"></div>
  <button class="btn-back" onclick="showScreen('titleScreen')">← コース選択に戻る</button>
</div>

<!-- ═══ GAME ══════════════════════════════════════════════════════════ -->
<div id="gameScreen" class="screen hidden">
  <div id="hud">
    <div id="scoreEl">0</div>
    <div id="wpmEl">0 WPM</div>
    <div id="accEl">100%</div>
    <div class="hud-sep"></div>
    <div id="timerEl">90</div>
    <button class="hud-btn" onclick="confirmExit()">✕</button>
  </div>
  <div id="gameArea">
    <div id="stageLabel"></div>
    <div id="wordEmoji"></div>
    <div id="wordHint"></div>
    <div id="typingDisplay"></div>
    <div id="progressWrap"><div id="progressBar"></div></div>
    <div id="wordCount"></div>
    <div id="fingerLabel"></div>
  </div>
  <div id="handGuide">
    <div id="leftHandSVG"></div>
    <div id="rightHandSVG"></div>
  </div>
</div>

<!-- ═══ RESULT ════════════════════════════════════════════════════════ -->
<div id="resultScreen" class="screen hidden" style="text-align:center">
  <div class="result-title" id="resultGrade"></div>
  <div class="result-sub">RESULT</div>
  <div class="stat-row">
    <div class="stat-box"><div class="stat-val" id="rScore">0</div><div class="stat-lbl">SCORE</div></div>
    <div class="stat-box"><div class="stat-val" id="rWPM">0</div><div class="stat-lbl">WPM</div></div>
    <div class="stat-box"><div class="stat-val" id="rAcc">0%</div><div class="stat-lbl">正確率</div></div>
    <div class="stat-box"><div class="stat-val" id="rWords">0</div><div class="stat-lbl">完了語数</div></div>
  </div>
  <div class="items-box">
    <div class="items-box-ttl">🎁 GET アイテム</div>
    <div class="items-chips" id="rItems"></div>
    <div class="craft-hint" id="craftHint"></div>
  </div>
  <div class="result-btns">
    <button class="btn-back" id="retryBtn">もう一度</button>
    <button class="btn-back" onclick="showScreen('stageScreen')">ステージ選択</button>
    <a href="index.html" class="btn-home">🏠 ホーム</a>
  </div>
</div>

// ─── STAGE DATA ─────────────────────────────────────────────────────────────
const STAGES = [

  {

const KEY_FINGER = {
  // ─ Left hand ─
  '`':'L_PINKY','1':'L_PINKY','q':'L_PINKY','a':'L_PINKY','z':'L_PINKY',
  '2':'L_RING','w':'L_RING','s':'L_RING','x':'L_RING',
  '3':'L_MID','e':'L_MID','d':'L_MID','c':'L_MID',
  '4':'L_INDEX','5':'L_INDEX','r':'L_INDEX','t':'L_INDEX',
  'f':'L_INDEX','g':'L_INDEX','v':'L_INDEX','b':'L_INDEX',
  // ─ Right hand ─
  '6':'R_INDEX','7':'R_INDEX','y':'R_INDEX','u':'R_INDEX',
  'h':'R_INDEX','j':'R_INDEX','n':'R_INDEX','m':'R_INDEX',
  '8':'R_MID','i':'R_MID','k':'R_MID',',':'R_MID',
  '9':'R_RING','o':'R_RING','l':'R_RING','.':'R_RING',
  '0':'R_PINKY','-':'R_PINKY','=':'R_PINKY','p':'R_PINKY',
  '[':'R_PINKY',']':'R_PINKY','\\':'R_PINKY',"'":'R_PINKY',';':'R_PINKY',
  '/':'R_PINKY',
  // ─ Space ─
  ' ':'R_THUMB',
  // ─ Shifted symbols (same finger as the base key) ─
  '~':'L_PINKY','!':'L_PINKY','@':'L_RING','#':'L_MID',
  '$':'L_INDEX','%':'L_INDEX',
  '^':'R_INDEX','&':'R_INDEX','*':'R_MID',
  '(':'R_RING',')':'R_PINKY','_':'R_PINKY','+':'R_PINKY',
  '{':'R_PINKY','}':'R_PINKY','|':'R_PINKY',
  ':':'R_PINKY','"':'R_PINKY','<':'R_MID','>':'R_RING','?':'R_PINKY',
};

const NEEDS_SHIFT = new Set('ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$%^&*()_+{}|:"<>?~');

function getFingers(ch) {
  const shift = NEEDS_SHIFT.has(ch);
  const lookupKey = shift ? ch.toLowerCase() : ch;
  const base = KEY_FINGER[lookupKey] || KEY_FINGER[ch];
  if (!base) return [];
  if (!shift || base.endsWith('THUMB')) return [base];
  const shiftKey = base.startsWith('L') ? 'R_PINKY' : 'L_PINKY';
  return [base, shiftKey];
}

function calcDrop(acc, wpm) {
  // Determine which rarity levels are available
  const maxRarity = acc >= 88 ? 4 : acc >= 70 ? 3 : acc >= 50 ? 2 : 1;
  const pool = ITEMS.filter(it => it.rarity <= maxRarity);
  const drops = [];
  const chance = Math.min(.7, .25 + acc / 250 + wpm / 500);
  if (Math.random() < chance) {
    // Weight towards common: rarity 1→weight 40, 2→20, 3→8, 4→3
    const weights = [0, 40, 20, 8, 3];
    const eligible = pool.map(it => ({it, w: weights[it.rarity]}));
    const tot = eligible.reduce((s, x) => s + x.w, 0);
    let r = Math.random() * tot;
    for (const {it, w} of eligible) { r -= w; if (r <= 0) { drops.push(it); break; } }
  }
  // Bonus drop for excellent play
  if (acc >= 90 && wpm >= 30 && Math.random() < .28) {
    const bonus = ITEMS.filter(it => it.rarity >= 2 && it.rarity <= maxRarity);
    if (bonus.length) drops.push(bonus[Math.floor(Math.random()*bonus.length)]);
  }
  return drops;
}

function highlightFingers(codes) {
  document.querySelectorAll('.finger .fng-rect').forEach(r => {
    r.setAttribute('fill', SKIN);
    r.closest('.finger').style.filter = '';
  });
  if (!codes || !codes.length) return;
  const side = codes[0].startsWith('L') ? 'left' : 'right';
  codes.forEach(code => {
    const el = document.getElementById(FINGER_EL[code]);
    if (!el) return;
    const rect = el.querySelector('.fng-rect');
    const col = FINGER_COLOR[code] || '#fff';
    rect.setAttribute('fill', col);
    const glowSide = code.startsWith('L') ? 'left' : 'right';
    el.style.filter = `drop-shadow(0 0 9px ${col}) url(#glow_${glowSide})`;
  });
}

// ─── GAME ─────────────────────────────────────────────────────────────────────
function startGame(stage) {
  curStage = stage;
  wordList = [...stage.words].sort(() => Math.random() - .5).slice(0, 30);
  wordIdx = charIdx = totalCorrect = totalMiss = combo = score = 0;
  timer = stage.time || 90;
  startTime = Date.now();
  sessionDrops = [];
  gameActive = true;

  document.getElementById('stageLabel').textContent = `${stage.icon}  ${stage.name}`;
  document.getElementById('retryBtn').onclick = () => startGame(curStage);
  buildHands();
  showScreen('gameScreen');
  loadWord();
  startTimer();
  document.addEventListener('keydown', onKeyDown);
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!gameActive) return;
    if (--timer <= 0) { timer = 0; updateHUD(); endGame(); }
    else updateHUD();
  }, 1000);
}

function loadWord() {
  if (wordIdx >= wordList.length) { endGame(); return; }
  const word = wordList[wordIdx];
  charIdx = 0;
  document.getElementById('wordHint').textContent  = word.h || '';
  document.getElementById('wordEmoji').textContent = word.e || '';
  document.getElementById('progressBar').style.width = (wordIdx / wordList.length * 100) + '%';
  document.getElementById('wordCount').textContent = `${wordIdx + 1} / ${wordList.length}`;

  const disp = document.getElementById('typingDisplay');
  disp.innerHTML = '';
  [...word.t].forEach((ch, i) => {
    const sp = document.createElement('span');
    sp.className = 'ch' + (i === 0 ? ' cur' : '');
    sp.textContent = ch;
    disp.appendChild(sp);
  });

  if (curStage.tts && word.t.length <= 2) speak(word.t);
  updateHandGuide();
  updateHUD();
}

function updateHandGuide() {
  const word = wordList[wordIdx];
  if (!word || charIdx >= word.t.length) { highlightFingers([]); document.getElementById('fingerLabel').textContent = ''; return; }
  const ch = word.t[charIdx];
  const fingers = getFingers(ch);
  highlightFingers(fingers);
  const disp  = ch === ' ' ? 'スペース' : `"${ch}"`;
  const names = fingers.map(f => FINGER_LABEL[f] || f).join(' ＋ ');
  const shift = NEEDS_SHIFT.has(ch) ? '  （Shiftキー）' : '';
  document.getElementById('fingerLabel').textContent = `${disp} → ${names}${shift}`;
}

function onKeyDown(e) {
  if (!gameActive) return;
  if (e.key === 'Escape') { confirmExit(); return; }
  if (['Tab','F5'].includes(e.key)) { e.preventDefault(); return; }
  if (['Shift','Control','Alt','Meta','CapsLock','Dead'].includes(e.key)) return;

  const word = wordList[wordIdx];
  if (!word) return;
  if (e.key === word.t[charIdx]) onCorrectChar();
  else onMissChar();
}

function onCorrectChar() {
  const spans = document.getElementById('typingDisplay').querySelectorAll('.ch');
  spans[charIdx].classList.remove('cur');
  spans[charIdx].classList.add('done');
  charIdx++;
  totalCorrect++;

  if (charIdx >= wordList[wordIdx].t.length) {
    onWordComplete();
  } else {
    spans[charIdx].classList.add('cur');
    updateHandGuide();
  }
  recalcScore();
  updateHUD();
}

function onMissChar() {
  totalMiss++;
  combo = 0;
  const spans = document.getElementById('typingDisplay').querySelectorAll('.ch');
  const sp = spans[charIdx];
  sp.classList.add('miss');
  setTimeout(() => sp.classList.remove('miss'), 280);
  flashScreen('rgba(248,113,113,.2)');
  recalcScore();
  updateHUD();
}

function onWordComplete() {
  const word = wordList[wordIdx];
  if (curStage.tts && word.t.length > 1) speak(word.t);
  combo++;
  if (combo >= 2) showComboPop(combo);
  flashScreen('rgba(74,222,128,.14)');

  // Item drops
  const acc = calcAcc(), wpm = calcWPM();
  const drops = calcDrop(acc, wpm);
  drops.forEach(item => {
    sessionDrops.push(item);
    showItemMiniPop(item);
  });

  wordIdx++;
  if (wordIdx >= wordList.length) setTimeout(endGame, 400);
  else setTimeout(loadWord, 220);
}

function recalcScore() {
  const sp = Math.max(1, calcWPM() / 20);
  score = Math.max(0, Math.round(totalCorrect * sp - totalMiss * 10));
}
function calcWPM() {
  const min = (Date.now() - startTime) / 60000;
  return min < .01 ? 0 : Math.round((totalCorrect / 5) / min);
}
function calcAcc() {
  const t = totalCorrect + totalMiss;
  return t === 0 ? 100 : Math.round(totalCorrect / t * 100);
}
function updateHUD() {
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('wpmEl').textContent   = calcWPM() + ' WPM';
  document.getElementById('accEl').textContent   = calcAcc() + '%';
  const el = document.getElementById('timerEl');
  el.textContent = timer;
  el.style.color = timer <= 10 ? '#f87171' : timer <= 20 ? '#fb923c' : '#fff';
}

// ─── END GAME ─────────────────────────────────────────────────────────────────
function endGame() {
  if (!gameActive) return;
  gameActive = false;
  clearInterval(timerInterval);
  document.removeEventListener('keydown', onKeyDown);
  highlightFingers([]);

  const acc = calcAcc(), wpm = calcWPM();
  const grade = acc>=95&&wpm>=40?'S' : acc>=88&&wpm>=28?'A' : acc>=75?'B' : acc>=60?'C' : 'D';

  // Build result data
  document.getElementById('resultGrade').textContent = `GRADE ${grade}`;
  document.getElementById('rScore').textContent = score;
  document.getElementById('rWPM').textContent   = wpm;
  document.getElementById('rAcc').textContent   = acc + '%';
  document.getElementById('rWords').textContent = wordIdx;

  // Group items for result screen
  const grouped = {};
  sessionDrops.forEach(it => { grouped[it.id] = (grouped[it.id] || {item:it, cnt:0}); grouped[it.id].cnt++; });
  const chips = document.getElementById('rItems');
  chips.innerHTML = '';
  if (!Object.keys(grouped).length) {
    chips.innerHTML = '<div style="color:#333;font-size:.75rem;padding:.2rem">アイテムはゲットできませんでした… もっとがんばろう！</div>';
  } else {
    Object.values(grouped).forEach(({item:it, cnt}) => {
      const div = document.createElement('div');
      div.className = 'item-chip';
      div.innerHTML = `${it.icon}<span style="color:${it.color}">${it.name}</span><span style="color:#555">×${cnt}</span>`;
      chips.appendChild(div);
    });
  }

  // Craft hint
  const hintEl = document.getElementById('craftHint');
  hintEl.textContent = '';
  const counts = {};
  sessionDrops.forEach(it => { counts[it.id] = (counts[it.id]||0)+1; });
  for (const r of RECIPES) {
    if (Object.entries(r.needs).every(([id,n]) => (counts[id]||0) >= n)) {
      hintEl.textContent = `🔨 クラフト可能：${r.result}`; break;
    }
  }
  if (!hintEl.textContent) {
    const partial = RECIPES.find(r => Object.keys(r.needs).some(id => counts[id]));
    if (partial) hintEl.textContent = `💡 ${partial.hint}`;
  }

  // Show item reveal then result
  setTimeout(() => showRevealSequence(sessionDrops, () => showScreen('resultScreen')), 350);
}

function confirmExit() {
  if (confirm('ゲームを終了しますか？')) {
    gameActive = false;
    clearInterval(timerInterval);
    document.removeEventListener('keydown', onKeyDown);
    showScreen('stageScreen');
  }
}

// ─── VISUAL FEEDBACK ──────────────────────────────────────────────────────────
function flashScreen(col) {
  const f = document.getElementById('flash');
  f.style.background = col;
  f.style.opacity = '1';
  setTimeout(() => { f.style.opacity = '0'; }, 140);
}

// Small in-game notification (during play)
function showItemMiniPop(item) {
  if (!item) return;
  const el = document.createElement('div');
  el.className = 'item-pop';
  const ri = RARITY_INFO[item.rarity];
  el.innerHTML = `${item.icon} <span style="color:${item.color}">${item.name}</span> <span style="color:${ri.color};font-size:.68rem">${ri.stars}</span>`;
  document.getElementById('itemLayer').appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

// ─── ITEM REVEAL SEQUENCE ─────────────────────────────────────────────────────
function showRevealSequence(drops, onDone) {
  if (!drops.length) { onDone(); return; }
  const overlay = document.getElementById('revealOverlay');
  const card    = document.getElementById('revealCard');
  const ptcl    = document.getElementById('rvParticles');
  let idx = 0;

  function spawnParticles(color) {
    ptcl.innerHTML = '';
    const colors = [color, '#fff', '#fcd34d', color, '#a78bfa'];
    for (let i = 0; i < 55; i++) {
      const p = document.createElement('div');
      p.className = 'rv-p';
      const size = Math.random() * 10 + 4;
      const dur  = Math.random() * 2.5 + 1.5;
      const del  = Math.random() * .8;
      p.style.cssText = `width:${size}px;height:${size}px;
        left:${Math.random()*100}%;top:-20px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        opacity:.85;
        animation-duration:${dur}s;animation-delay:${del}s`;
      ptcl.appendChild(p);
    }
  }

  function showItem() {
    const item = drops[idx];
    const ri = RARITY_INFO[item.rarity];
    const total = drops.length;

    // Re-trigger pop animation by replacing the card
    card.style.animation = 'none';
    void card.offsetWidth;
    card.style.animation = '';

    const stars = [1,2,3,4].map(n =>
      `<span class="rv-star${n <= item.rarity ? ' lit' : ''}" style="color:${ri.color}">${n <= item.rarity ? '★' : '☆'}</span>`
    ).join('');

    card.innerHTML = `
      <div class="rv-rarity">${stars}
        <span style="font-size:.82rem;color:${ri.color};margin-left:.4rem;letter-spacing:.12em">${ri.name}</span>
      </div>
      <div class="rv-emoji" style="--ic:${item.color}">${item.icon}</div>
      <div class="rv-name" style="--ic:${item.color}">${item.name}</div>
      <div class="rv-desc">${item.desc}</div>
      <div class="rv-get">🎉 ゲット！</div>
      <div class="rv-cnt">${idx+1} / ${total} アイテム</div>
      <button class="rv-next" onclick="window._rvNext()">
        ${idx+1 < total ? '次のアイテムへ →' : '結果を見る →'}
      </button>`;

    spawnParticles(item.color);
    overlay.classList.remove('hidden');
  }

  window._rvNext = function() {
    idx++;
    if (idx >= drops.length) {
      overlay.classList.add('hidden');
      ptcl.innerHTML = '';
      delete window._rvNext;
      onDone();
    } else {
      showItem();
    }
  };

  showItem();
}

function showComboPop(n) {
  const el = document.createElement('div');
  el.className = 'combo-pop';
  el.textContent = `${n} COMBO!`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 750);
}

// ─── TTS ──────────────────────────────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = .82;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ─── BACKGROUND ───────────────────────────────────────────────────────────────
(function() {
  const c = document.getElementById('bgC');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize() {
    c.width = innerWidth; c.height = innerHeight;
    stars = Array.from({length:90}, () => ({
      x:Math.random()*c.width, y:Math.random()*c.height,
      r:Math.random()*1.2+.2, a:Math.random(), s:(Math.random()*.006+.002)*(Math.random()<.5?1:-1)
    }));
  }
  function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s => {
      s.a += s.s;
      if (s.a > 1) { s.a=1; s.s=-Math.abs(s.s); }
      if (s.a < 0) { s.a=0; s.s=Math.abs(s.s); }
      ctx.globalAlpha = s.a * .65;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  resize();
  addEventListener('resize', resize);
  draw();
})();
</script>
