<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Fall — SAKURA KIDS</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#06071a;color:#fff;
  font-family:'Segoe UI',system-ui,sans-serif;touch-action:manipulation}

/* ── CANVAS ─────────────────────────── */
#bgC,#pC{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}
#bgC{z-index:1}
#pC{z-index:100}
#flash{position:fixed;inset:0;pointer-events:none;z-index:90;opacity:0}

/* ── SCREENS ─────────────────────────── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:10;transition:opacity .3s}
.screen.hidden{opacity:0;pointer-events:none}

/* ── TITLE ───────────────────────────── */
.logo{font-size:3rem;font-weight:900;letter-spacing:.03em;
  background:linear-gradient(135deg,#a78bfa 0%,#60a5fa 50%,#34d399 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;line-height:1.1}
.logo-sub{color:#7070a0;font-size:.85rem;letter-spacing:.25em;text-transform:uppercase;
  margin:.4rem 0 2.5rem;text-align:center}
.btn{display:inline-flex;align-items:center;justify-content:center;
  padding:.85rem 2.4rem;border:none;border-radius:50px;cursor:pointer;
  font-size:1rem;font-weight:700;letter-spacing:.05em;margin:.3rem;
  transition:transform .1s,box-shadow .2s;text-decoration:none}
.btn:active{transform:scale(.96)}
.btn-play{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;
  font-size:1.15rem;padding:1rem 3.2rem;
  box-shadow:0 0 40px rgba(124,58,237,.45)}
.btn-play:hover{box-shadow:0 0 60px rgba(124,58,237,.7)}
.btn-ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#aaa}
.btn-ghost:hover{background:rgba(255,255,255,.12);color:#fff}
.btn-sm{padding:.35rem .7rem;font-size:.78rem;font-weight:600;border:none;
  border-radius:7px;cursor:pointer;transition:all .15s}
.btn-del{background:rgba(248,113,113,.13);color:#f87171}
.btn-del:hover{background:rgba(248,113,113,.28)}
.btn-edit{background:rgba(160,132,255,.13);color:#c4b5fd}
.btn-edit:hover{background:rgba(160,132,255,.28)}

/* ── LEVEL SELECT ────────────────────── */
.screen-title{font-size:1.35rem;font-weight:700;color:#ccc;margin-bottom:.4rem;text-align:center}
.lv-grid{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin:1.8rem 0}
.lv-card{width:140px;padding:1.5rem 1rem;text-align:center;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
  border-radius:18px;cursor:pointer;transition:all .2s}
.lv-card:hover{transform:translateY(-6px);background:rgba(124,58,237,.15);
  border-color:rgba(124,58,237,.5);box-shadow:0 12px 40px rgba(124,58,237,.25)}
.lv-icon{font-size:2.4rem;margin-bottom:.4rem}
.lv-label{font-weight:800;font-size:1.05rem;margin-bottom:.2rem}
.lv-desc{font-size:.72rem;color:#555}
.mode-row{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center;margin-bottom:1rem}
.mode-btn{padding:.5rem 1.2rem;border-radius:10px;cursor:pointer;font-size:.85rem;font-weight:600;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);
  transition:all .2s;color:#aaa}
.mode-btn.active{background:rgba(124,58,237,.3);border-color:#7c3aed;color:#c4b5fd}
.mode-btn.locked{opacity:.4;cursor:default}
.unlock-hint{font-size:.72rem;color:#555;margin-top:.2rem}

/* ── GAME SCREEN ─────────────────────── */
#gameScreen{justify-content:flex-start}
#hud{width:100%;padding:.55rem 1rem;display:flex;align-items:center;gap:.8rem;
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);z-index:20;flex-shrink:0;min-height:50px}
#scoreEl{font-size:1.2rem;font-weight:900;color:#fcd34d;min-width:75px}
#comboEl{font-size:.8rem;font-weight:700;min-width:72px;color:#a78bfa}
#timerWrap{flex:1;height:9px;background:rgba(255,255,255,.09);border-radius:5px;overflow:hidden}
#timerBar{height:100%;width:100%;border-radius:5px;
  background:linear-gradient(90deg,#4ade80,#60a5fa);transition:width .1s linear}
#timerTxt{font-size:1rem;font-weight:700;min-width:32px;text-align:right}
#gameArea{flex:1;width:100%;position:relative;overflow:hidden}

/* falling word */
.fword{position:absolute;transform:translateX(-50%);
  padding:.55rem 1.5rem;background:rgba(40,20,80,.88);
  border:2px solid rgba(180,150,255,.7);border-radius:14px;
  font-size:1.45rem;font-weight:900;letter-spacing:.07em;
  color:#ffffff;text-shadow:0 0 16px rgba(200,170,255,1),0 2px 4px rgba(0,0,0,.8);
  box-shadow:0 0 28px rgba(140,80,255,.5),0 4px 16px rgba(0,0,0,.5);
  white-space:nowrap;pointer-events:none;user-select:none}
.fword.urgent{border-color:rgba(248,113,113,.9);
  text-shadow:0 0 16px rgba(255,150,150,1),0 2px 4px rgba(0,0,0,.8);
  box-shadow:0 0 28px rgba(248,113,113,.55),0 4px 16px rgba(0,0,0,.5)}
.fword.answered{opacity:0;transform:translateX(-50%) scale(1.25);
  transition:opacity .3s,transform .3s}

/* choices */
#choicesArea{width:100%;padding:.9rem;display:grid;grid-template-columns:1fr 1fr;
  gap:.75rem;background:rgba(0,0,0,.65);backdrop-filter:blur(10px);
  flex-shrink:0;z-index:20}
.cbtn{padding:1.25rem .65rem;background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.11);border-radius:16px;
  color:#ddd;font-size:1.42rem;font-weight:600;cursor:pointer;
  transition:all .12s;text-align:center;min-height:78px;position:relative;overflow:hidden}
.cbtn:not(.chide):hover{background:rgba(124,58,237,.22);border-color:rgba(124,58,237,.5)}
.cbtn:not(.chide):active{transform:scale(.95)}
.cbtn.chide{opacity:0;pointer-events:none}
.bgm-btn{background:none;border:1px solid rgba(255,255,255,.16);border-radius:8px;
  color:#666;padding:.18rem .48rem;cursor:pointer;font-size:1.05rem;
  transition:all .2s;flex-shrink:0;line-height:1}
.bgm-btn:hover{background:rgba(255,255,255,.1);color:#c4b5fd}
.bgm-btn.on{color:#a78bfa;border-color:rgba(167,139,250,.5)}
.cbtn.cor{background:rgba(74,222,128,.2)!important;border-color:#4ade80!important;
  color:#4ade80!important;box-shadow:0 0 18px rgba(74,222,128,.4)!important}
.cbtn.wrng{background:rgba(248,113,113,.2)!important;border-color:#f87171!important;
  color:#f87171!important;animation:shake .32s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}60%{transform:translateX(9px)}}

/* score popup */
.spop{position:fixed;pointer-events:none;z-index:200;
  font-size:1.4rem;font-weight:900;animation:popUp 1.3s ease-out forwards}
@keyframes popUp{0%{opacity:1;transform:translateY(0) scale(1)}
  15%{transform:translateY(-12px) scale(1.15)}100%{opacity:0;transform:translateY(-75px) scale(.85)}}

/* ── RESULT ──────────────────────────── */
.res-pts{font-size:4.5rem;font-weight:900;
  background:linear-gradient(135deg,#fcd34d,#f97316);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.res-stats{display:flex;gap:.9rem;flex-wrap:wrap;justify-content:center;margin:1.4rem 0 2rem}
.sbox{text-align:center;padding:.9rem 1.4rem;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px}
.sval{font-size:1.9rem;font-weight:800}
.slbl{font-size:.7rem;color:#555;margin-top:.2rem;letter-spacing:.05em;text-transform:uppercase}

/* ── ADMIN ───────────────────────────── */
#adminScreen{justify-content:flex-start}
.admin-hdr{width:100%;padding:.8rem 1.2rem;display:flex;align-items:center;gap:.8rem;
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);flex-shrink:0}
.admin-hdr h2{font-size:1.1rem;font-weight:700;flex:1}
.admin-body{flex:1;width:100%;overflow-y:auto;padding:1rem;-webkit-overflow-scrolling:touch}
.tabs{display:flex;gap:.4rem;margin-bottom:.9rem}
.tab{padding:.42rem 1rem;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);transition:all .2s;color:#888}
.tab.active{background:rgba(124,58,237,.3);border-color:#7c3aed;color:#c4b5fd}
.add-row{display:flex;gap:.4rem;margin-bottom:.7rem;flex-wrap:wrap;align-items:center}
.add-row input{flex:1;min-width:90px;max-width:155px;
  padding:.48rem .7rem;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.14);border-radius:8px;
  color:#fff;font-size:.88rem}
.add-row input:focus{outline:none;border-color:#7c3aed}
.add-row input::placeholder{color:#444}
.act-row{display:flex;gap:.4rem;margin-bottom:.7rem;flex-wrap:wrap}
.wcount{font-size:.75rem;color:#444;margin-bottom:.4rem}
.wrow{display:flex;align-items:center;gap:.45rem;
  padding:.45rem .3rem;border-bottom:1px solid rgba(255,255,255,.04);font-size:.87rem}
.wrow:hover{background:rgba(255,255,255,.02);border-radius:6px}
.wen{font-weight:700;min-width:100px;color:#c4b5fd}
.wja{flex:1;color:#999}
.pos-badge{font-size:.65rem;font-weight:700;padding:.15rem .42rem;border-radius:5px;
  white-space:nowrap;flex-shrink:0;min-width:32px;text-align:center}
.pos-badge.n   {background:rgba(96,165,250,.18);color:#60a5fa}
.pos-badge.v   {background:rgba(74,222,128,.18);color:#4ade80}
.pos-badge.adj {background:rgba(251,191,36,.18);color:#fbbf24}
.pos-badge.adv {background:rgba(249,115,22,.18);color:#f97316}
.pos-badge.prep{background:rgba(244,114,182,.18);color:#f472b6}
.pos-badge.phrase{background:rgba(167,139,250,.18);color:#a78bfa}
.pos-badge.other{background:rgba(255,255,255,.08);color:#666}
.pos-badge.unclassified{background:rgba(255,255,255,.04);color:#444;font-style:italic}
.add-row select{padding:.48rem .5rem;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.14);border-radius:8px;
  color:#fff;font-size:.85rem;cursor:pointer}
.add-row select:focus{outline:none;border-color:#7c3aed}
.add-row select option{background:#12132a;color:#fff}
.modal-box select{width:100%;padding:.55rem .75rem;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
  border-radius:8px;color:#fff;font-size:.88rem;margin-bottom:.45rem;cursor:pointer}
.modal-box select:focus{outline:none;border-color:#7c3aed}
.modal-box select option{background:#12132a}
/* pos filter in level screen */
.pos-filter-row{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;margin-bottom:.5rem}
.pf-btn{padding:.38rem .85rem;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);
  transition:all .2s;color:#888;user-select:none}
.pf-btn.active{background:rgba(124,58,237,.3);border-color:#7c3aed;color:#c4b5fd}
.pf-btn.active.n   {background:rgba(96,165,250,.25);border-color:#60a5fa;color:#60a5fa}
.pf-btn.active.v   {background:rgba(74,222,128,.25);border-color:#4ade80;color:#4ade80}
.pf-btn.active.adj {background:rgba(251,191,36,.25);border-color:#fbbf24;color:#fbbf24}
.pf-btn.active.adv {background:rgba(249,115,22,.25);border-color:#f97316;color:#f97316}
.pf-btn.active.prep{background:rgba(244,114,182,.25);border-color:#f472b6;color:#f472b6}
.pf-btn.active.phrase{background:rgba(167,139,250,.25);border-color:#a78bfa;color:#a78bfa}
.pf-btn.active.other{background:rgba(255,255,255,.15);border-color:#aaa;color:#ddd}
.import-box{padding:.9rem;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);border-radius:12px;margin-top:.8rem}
.import-box h4{font-size:.85rem;color:#888;margin-bottom:.55rem}
.import-box textarea{width:100%;height:110px;background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.09);border-radius:8px;
  color:#fff;font-size:.78rem;padding:.45rem;resize:vertical}
.import-box textarea:focus{outline:none;border-color:#7c3aed}
.hint{font-size:.68rem;color:#444;margin:.25rem 0}
.imp-btns{display:flex;gap:.4rem;margin-top:.45rem;flex-wrap:wrap}

/* edit modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;
  display:flex;align-items:center;justify-content:center}
.modal-ov.hidden{display:none}
.modal-box{background:#12132a;border:1px solid rgba(255,255,255,.1);
  border-radius:16px;padding:1.5rem;width:90%;max-width:380px}
.modal-box h3{margin-bottom:.9rem;font-size:1rem}
.modal-box input{width:100%;padding:.55rem .75rem;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
  border-radius:8px;color:#fff;font-size:.88rem;margin-bottom:.45rem}
.modal-box input:focus{outline:none;border-color:#7c3aed}
.modal-acts{display:flex;gap:.5rem;margin-top:.9rem;justify-content:flex-end}

@media(max-width:400px){
  .logo{font-size:2.3rem}
  .fword{font-size:1.1rem;padding:.4rem 1rem}
  .cbtn{font-size:1.1rem;min-height:65px}
  .lv-card{width:115px;padding:1.1rem .7rem}
}
</style>
</head>
<body>

<canvas id="bgC"></canvas>
<canvas id="pC"></canvas>
<div id="flash"></div>

<!-- ═══ TITLE ═══════════════════════════════════════════ -->
<div id="titleScreen" class="screen">
  <div class="logo">⬇ Word Fall</div>
  <div class="logo-sub">SAKURA KIDS</div>
  <button class="btn btn-play" onclick="showScreen('levelScreen');if(bgmPref&&!bgmOn)startBGM()">▶ PLAY</button><br>
  <button class="btn btn-ghost" onclick="showScreen('adminScreen');initAdmin()">⚙ 単語管理</button>
  <div style="margin-top:1.5rem">
    <a href="index.html" style="display:inline-block;margin-top:.5rem;color:#fff;font-size:.9rem;
      font-weight:700;text-decoration:none;letter-spacing:.05em;padding:10px 26px;
      background:rgba(255,255,255,.13);border:1.5px solid rgba(255,255,255,.35);border-radius:40px;
      transition:background .2s,transform .15s"
      onmouseover="this.style.background='rgba(255,255,255,.22)';this.style.transform='scale(1.04)'"
      onmouseout="this.style.background='rgba(255,255,255,.13)';this.style.transform='scale(1)'">🏠 ホームに戻る</a>
  </div>
</div>

<!-- ═══ LEVEL SELECT ══════════════════════════════════════ -->
<div id="levelScreen" class="screen hidden">
  <div class="screen-title">レベル・モードを選択</div>
  <div style="color:#444;font-size:.75rem;margin-bottom:1rem">英検対応</div>
  <div class="lv-grid">
    <div class="lv-card" onclick="pickLevel('4')">
      <div class="lv-icon">⭐</div>
      <div class="lv-label" style="color:#a3e635">4 級</div>
      <div class="lv-desc">CEFR A1</div>
    </div>
    <div class="lv-card" onclick="pickLevel('3')">
      <div class="lv-icon">🟢</div>
      <div class="lv-label" style="color:#4ade80">3 級</div>
      <div class="lv-desc">CEFR A2</div>
    </div>
    <div class="lv-card" onclick="pickLevel('pre2')">
      <div class="lv-icon">🔵</div>
      <div class="lv-label" style="color:#60a5fa">準 2 級</div>
      <div class="lv-desc">CEFR B1</div>
    </div>
    <div class="lv-card" onclick="pickLevel('2')">
      <div class="lv-icon">🟠</div>
      <div class="lv-label" style="color:#f97316">2 級</div>
      <div class="lv-desc">CEFR B2</div>
    </div>
  </div>
  <div style="margin-bottom:.5rem;font-size:.82rem;color:#555">モード</div>
  <div class="mode-row">
    <div class="mode-btn active" id="modeReading" onclick="setMode('reading')">📖 Reading</div>
    <div class="mode-btn locked" id="modeWriting" title="Reading で一定スコアに達するとアンロック">✏ Writing 🔒</div>
  </div>
  <div class="unlock-hint" id="unlockHint"></div>
  <br>
  <div style="margin-bottom:.4rem;font-size:.82rem;color:#555">品詞フィルター</div>
  <div class="pos-filter-row" id="posFilterRow">
    <div class="pf-btn active" id="pf_all"    onclick="togglePosFilter('')">すべて</div>
    <div class="pf-btn" id="pf_n"      onclick="togglePosFilter('n')">名詞</div>
    <div class="pf-btn" id="pf_v"      onclick="togglePosFilter('v')">動詞</div>
    <div class="pf-btn" id="pf_adj"    onclick="togglePosFilter('adj')">形容詞</div>
    <div class="pf-btn" id="pf_adv"    onclick="togglePosFilter('adv')">副詞</div>
    <div class="pf-btn" id="pf_prep"   onclick="togglePosFilter('prep')">前置詞</div>
    <div class="pf-btn" id="pf_phrase" onclick="togglePosFilter('phrase')">熟語</div>
    <div class="pf-btn" id="pf_other"  onclick="togglePosFilter('other')">その他</div>
  </div>
  <div class="unlock-hint" id="posHint" style="margin-bottom:.5rem"></div>
  <br>
  <button class="btn btn-ghost" onclick="showScreen('titleScreen')">← 戻る</button>
</div>

<!-- ═══ GAME ══════════════════════════════════════════════ -->
<div id="gameScreen" class="screen hidden">
  <div id="hud">
    <div id="scoreEl">0</div>
    <div id="comboEl"></div>
    <div id="timerWrap"><div id="timerBar"></div></div>
    <div id="timerTxt">60</div>
    <button id="bgmBtn" class="bgm-btn on" onclick="toggleBGM()" title="BGM ON/OFF">♪</button>
    <button class="bgm-btn" style="color:#fff;border-color:rgba(255,255,255,.35)"
      onclick="if(confirm('ホームに戻りますか？'))location.href='index.html'" title="ホームに戻る">🏠</button>
  </div>
  <div id="gameArea"></div>
  <div id="choicesArea">
    <button class="cbtn" id="c0" onclick="handleChoice(0)"></button>
    <button class="cbtn" id="c1" onclick="handleChoice(1)"></button>
    <button class="cbtn" id="c2" onclick="handleChoice(2)"></button>
    <button class="cbtn" id="c3" onclick="handleChoice(3)"></button>
  </div>
</div>

<!-- ═══ RESULT ════════════════════════════════════════════ -->
<div id="resultScreen" class="screen hidden" style="text-align:center">
  <div style="color:#555;font-size:.85rem;letter-spacing:.12em;margin-bottom:.5rem">GAME OVER</div>
  <div class="res-pts" id="finalPts">0</div>
  <div style="color:#444;font-size:.8rem;margin-bottom:.2rem">points</div>
  <div style="color:#888;font-size:.82rem;margin-bottom:1rem" id="rankMsg"></div>
  <div class="res-stats">
    <div class="sbox"><div class="sval" id="sCor" style="color:#4ade80">0</div><div class="slbl">正解</div></div>
    <div class="sbox"><div class="sval" id="sWrn" style="color:#f87171">0</div><div class="slbl">ミス</div></div>
    <div class="sbox"><div class="sval" id="sMis" style="color:#f97316">0</div><div class="slbl">見逃し</div></div>
    <div class="sbox"><div class="sval" id="sMax" style="color:#a78bfa">0</div><div class="slbl">最大コンボ</div></div>
  </div>
  <button class="btn btn-play" style="font-size:1rem;padding:.9rem 2.6rem"
    onclick="startGame(curLevel)">もう一度</button><br>
  <button class="btn btn-ghost" onclick="showScreen('levelScreen')">レベル選択</button>
  <a href="index.html" class="btn" style="margin-top:.2rem;font-size:.9rem;font-weight:700;color:#fff;
    background:rgba(255,255,255,.13);border:1.5px solid rgba(255,255,255,.35);border-radius:40px;
    text-decoration:none;transition:background .2s,transform .15s"
    onmouseover="this.style.background='rgba(255,255,255,.22)';this.style.transform='scale(1.04)'"
    onmouseout="this.style.background='rgba(255,255,255,.13)';this.style.transform='scale(1)'">🏠 ホームに戻る</a>
</div>

<!-- ═══ ADMIN ══════════════════════════════════════════════ -->
<div id="adminScreen" class="screen hidden">
  <div class="admin-hdr">
    <h2>⚙ 単語管理</h2>
    <button class="btn btn-ghost" style="padding:.38rem .9rem;font-size:.82rem"
      onclick="showScreen('titleScreen')">← 戻る</button>
  </div>
  <div class="admin-body">
    <div class="tabs">
      <div class="tab active" id="at4"    onclick="switchTab('4')">4級</div>
      <div class="tab"        id="at3"    onclick="switchTab('3')">3級</div>
      <div class="tab"        id="atpre2" onclick="switchTab('pre2')">準2級</div>

const bgC = document.getElementById('bgC'), bgX = bgC.getContext('2d');
const pC  = document.getElementById('pC'),  pX  = pC.getContext('2d');
let bgParts = [];
let rareStars = [], rareSpawnTimer = 4, bgLastTs = null;
const RARE_COLORS = ['#ffd700','#ff9de2','#7df9ff','#ccaaff','#adffc8','#fffde7'];

// ── Surprise system ───────────────────────────────────────────
let earthObj = null;          // Earth surprise
let lastComboSurprise = 0;    // last combo count that triggered rainbow

function resizeCanvases() {
  bgC.width = pC.width = window.innerWidth;
  bgC.height = pC.height = window.innerHeight;
  initBgParts();
  rareStars = []; rareSpawnTimer = 4;
}

function initBgParts() {
  bgParts = [];
  const n = Math.min(120, Math.floor(window.innerWidth * window.innerHeight / 7000));
  for (let i = 0; i < n; i++) {
    bgParts.push({
      x: Math.random() * bgC.width, y: Math.random() * bgC.height,
      r: Math.random() * 1.4 + .25,
      vy: -(Math.random() * .28 + .04),
      vx: (Math.random() - .5) * .1,
      a: Math.random() * .55 + .15,
      h: Math.random() * 60 + 200  // blue-purple hue
    });
  }
}

function spawnRareStar() {
  const W = bgC.width, H = bgC.height;
  const roll = Math.random();
  if (roll < 0.42) {
    // 流れ星 (shooting star)
    const left = Math.random() < 0.5;
    rareStars.push({
      type: 'shoot',
      x: left ? -10 : W + 10, y: Math.random() * H * 0.5,
      vx: (left ? 1 : -1) * (280 + Math.random() * 200),
      vy: 60 + Math.random() * 80,
      life: 1.1, max: 1.1,
      color: Math.random() < 0.3 ? '#ffd700' : '#e8f0ff',
      tail: 55 + Math.random() * 35
    });
  } else if (roll < 0.78) {
    // カラーグロー星 (colored glow star)
    rareStars.push({
      type: 'glow',
      x: W * 0.08 + Math.random() * W * 0.84,
      y: Math.random() * H * 0.78,
      r: Math.random() * 2 + 1.5,
      life: 4 + Math.random() * 2.5, max: 4 + Math.random() * 2.5,
      color: RARE_COLORS[Math.floor(Math.random() * RARE_COLORS.length)],
      phase: Math.random() * Math.PI * 2
    });
  } else {
    // きらめき星 (4-point sparkle)
    rareStars.push({
      type: 'sparkle',
      x: W * 0.08 + Math.random() * W * 0.84,
      y: Math.random() * H * 0.8,
      r: Math.random() * 1.8 + 1.5,
      life: 2.5 + Math.random(), max: 2.5 + Math.random(),
      color: Math.random() < 0.5 ? '#fffde7' : RARE_COLORS[Math.floor(Math.random() * RARE_COLORS.length)],
      spin: (Math.random() - 0.5) * 1.5,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function drawRareStars(dt, t) {
  // Spawn rate: 9s at start → 3s at end of game
  const progress = running ? Math.max(0, (TOTAL_T - timeLeft) / TOTAL_T) : 0.15;
  rareSpawnTimer -= dt;
  if (rareSpawnTimer <= 0) {
    spawnRareStar();
    const interval = 9 - 6 * progress;
    rareSpawnTimer = interval * (0.5 + Math.random() * 0.9);
  }

  for (let i = rareStars.length - 1; i >= 0; i--) {
    const s = rareStars[i];
    s.life -= dt;
    if (s.life <= 0) { rareStars.splice(i, 1); continue; }
    const p = 1 - s.life / s.max; // 0→1

    if (s.type === 'shoot') {
      s.x += s.vx * dt; s.y += s.vy * dt;
      const alpha = Math.min(1, (s.max - s.life) * 8) * Math.min(1, s.life * 5);
      const tx = s.x - (s.vx / Math.abs(s.vx)) * s.tail;
      const ty = s.y - (s.vy / 120) * s.tail;
      const grad = bgX.createLinearGradient(tx, ty, s.x, s.y);
      grad.addColorStop(0, 'transparent'); grad.addColorStop(1, s.color);
      bgX.save();
      bgX.globalAlpha = alpha;
      bgX.strokeStyle = grad; bgX.lineWidth = 1.8;
      bgX.beginPath(); bgX.moveTo(tx, ty); bgX.lineTo(s.x, s.y); bgX.stroke();
      bgX.fillStyle = '#fff';
      bgX.beginPath(); bgX.arc(s.x, s.y, 1.8, 0, Math.PI * 2); bgX.fill();
      bgX.restore();

    } else if (s.type === 'glow') {
      const alpha = p < 0.1 ? p / 0.1 : p > 0.78 ? (1 - p) / 0.22 : 1;
      const pulse = 1 + 0.3 * Math.sin(t * 0.0022 + s.phase);
      bgX.save();
      bgX.globalAlpha = alpha * 0.82;
      const grd = bgX.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 5.5 * pulse);
      grd.addColorStop(0, s.color); grd.addColorStop(0.3, s.color + '55'); grd.addColorStop(1, 'transparent');
      bgX.fillStyle = grd;
      bgX.beginPath(); bgX.arc(s.x, s.y, s.r * 5.5 * pulse, 0, Math.PI * 2); bgX.fill();
      bgX.globalAlpha = alpha;
      bgX.fillStyle = '#fff';
      bgX.beginPath(); bgX.arc(s.x, s.y, s.r * 0.6, 0, Math.PI * 2); bgX.fill();
      bgX.restore();

    } else if (s.type === 'sparkle') {
      const alpha = p < 0.15 ? p / 0.15 : p > 0.75 ? (1 - p) / 0.25 : 1;
      const sc = 1 + 0.22 * Math.sin(t * 0.003 + s.phase);
      const r1 = s.r * 3.5 * sc, r2 = s.r * 0.85;
      bgX.save();
      bgX.globalAlpha = alpha * 0.88;
      bgX.translate(s.x, s.y);
      bgX.rotate(s.spin * t * 0.0008);
      bgX.fillStyle = s.color;
      bgX.beginPath();
      for (let k = 0; k < 8; k++) {
        const a = k * Math.PI / 4;
        const r = k % 2 === 0 ? r1 : r2;
        k === 0 ? bgX.moveTo(Math.cos(a)*r, Math.sin(a)*r)
                : bgX.lineTo(Math.cos(a)*r, Math.sin(a)*r);
      }
      bgX.closePath(); bgX.fill();
      bgX.fillStyle = '#fff';
      bgX.beginPath(); bgX.arc(0, 0, s.r * 0.5, 0, Math.PI * 2); bgX.fill();
      bgX.restore();
    }
  }
}

function drawBG(t) {
  const dt = bgLastTs ? Math.min((t - bgLastTs) / 1000, 0.1) : 0;
  bgLastTs = t;
  const W = bgC.width, H = bgC.height;
  const g = bgX.createRadialGradient(W*.5, H*.25, 0, W*.5, H*.25, W*.9);
  g.addColorStop(0, '#0d0d2e');
  g.addColorStop(1, '#06071a');
  bgX.fillStyle = g; bgX.fillRect(0, 0, W, H);

  // subtle aurora
  bgX.save();
  bgX.globalAlpha = .035 + .015 * Math.sin(t * .00025);
  const ag = bgX.createLinearGradient(0, 0, W, H * .45);
  ag.addColorStop(0, '#7c3aed'); ag.addColorStop(.5, '#4f46e5'); ag.addColorStop(1, '#0ea5e9');
  bgX.fillStyle = ag; bgX.fillRect(0, 0, W, H * .45);
  bgX.restore();

  // particles
  for (const p of bgParts) {
    p.x += p.vx; p.y += p.vy;
    if (p.y < -4) { p.y = bgC.height + 4; p.x = Math.random() * bgC.width; }
    bgX.beginPath(); bgX.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    bgX.fillStyle = `hsla(${p.h},80%,72%,${p.a})`; bgX.fill();
  }

  // rare stars
  drawRareStars(dt, t);

  // earth surprise
  drawEarth(dt, t);
}

// ══════════════════════════════════════════════════════════════
//  SURPRISE SYSTEM
// ══════════════════════════════════════════════════════════════
function initEarth() {
  if (earthObj) return;
  const W = bgC.width, H = bgC.height;
  const r = Math.min(W, H) * 0.11;
  earthObj = {
    x: W * 0.5, y: H * 0.36, r: Math.min(r, 72),
    alpha: 0, rot: 0, cloudRot: 0,
    // Fixed cloud positions (generated once)
    clouds: [
      { cx:-0.15, cy:-0.55, rx:0.28, ry:0.08, a: 0.3 },
      { cx: 0.45, cy:-0.05, rx:0.22, ry:0.07, a:-0.2 },
      { cx:-0.40, cy: 0.30, rx:0.24, ry:0.07, a: 0.4 },
      { cx: 0.10, cy: 0.58, rx:0.20, ry:0.06, a:-0.1 },
    ]
  };
  // Announce
  showSurpriseMsg('🌍 地球が現れた！');
}

function drawEarth(dt, t) {
  if (!earthObj) return;
  const e = earthObj;
  e.alpha = Math.min(0.92, e.alpha + dt * 0.28);
  e.rot += dt * 0.09;
  e.cloudRot += dt * 0.038;
  const { x, y, r } = e;

  bgX.save();

  // Outer atmosphere glow
  bgX.globalAlpha = e.alpha * 0.42;
  const atmG = bgX.createRadialGradient(x, y, r * 0.75, x, y, r * 1.55);
  atmG.addColorStop(0, 'rgba(80,190,255,0.55)');
  atmG.addColorStop(0.6, 'rgba(60,120,255,0.18)');
  atmG.addColorStop(1, 'transparent');
  bgX.fillStyle = atmG;
  bgX.beginPath(); bgX.arc(x, y, r * 1.55, 0, Math.PI * 2); bgX.fill();

  bgX.globalAlpha = e.alpha;
  bgX.translate(x, y);

  // Clip to sphere
  bgX.save();
  bgX.beginPath(); bgX.arc(0, 0, r, 0, Math.PI * 2); bgX.clip();

  // Ocean
  const oG = bgX.createRadialGradient(-r*0.28, -r*0.22, 0, 0, 0, r);
  oG.addColorStop(0, '#5aaee8'); oG.addColorStop(0.55, '#1f68b8'); oG.addColorStop(1, '#0b3870');
  bgX.fillStyle = oG; bgX.fillRect(-r, -r, r * 2, r * 2);

  // Land (rotates with planet)
  bgX.rotate(e.rot);
  bgX.fillStyle = '#3aaa5c';
  [[-0.08,-0.22, 0.36,0.28, 0.3],
   [-0.52, 0.06, 0.21,0.30,-0.2],
   [ 0.44, 0.33, 0.17,0.11, 0.4],
   [ 0.08, 0.55, 0.20,0.13,-0.1]].forEach(([lx,ly,rx,ry,a]) => {
    bgX.beginPath(); bgX.ellipse(lx*r, ly*r, rx*r, ry*r, a, 0, Math.PI*2); bgX.fill();
  });
  // Snow cap
  bgX.fillStyle = 'rgba(235,248,255,0.82)';
  bgX.beginPath(); bgX.ellipse(0, -r*0.84, r*0.26, r*0.13, 0, 0, Math.PI*2); bgX.fill();

  // Clouds (rotate slower)
  bgX.rotate(-e.rot + e.cloudRot);
  bgX.fillStyle = 'rgba(255,255,255,0.52)';
  e.clouds.forEach(c => {
    bgX.beginPath(); bgX.ellipse(c.cx*r, c.cy*r, c.rx*r, c.ry*r, c.angle, 0, Math.PI*2); bgX.fill();
  });
  bgX.restore(); // end clip

  // Highlight shine
  bgX.globalAlpha = e.alpha * 0.28;
  const shG = bgX.createRadialGradient(-r*0.32,-r*0.38, 0, -r*0.3,-r*0.35, r*0.65);
  shG.addColorStop(0, 'rgba(255,255,255,0.75)'); shG.addColorStop(1, 'transparent');
  bgX.fillStyle = shG;
  bgX.beginPath(); bgX.arc(0, 0, r, 0, Math.PI*2); bgX.fill();

  bgX.restore();
}

// Rainbow meteor shower — triggered on combo milestones
function triggerRainbowShower() {
  const W = bgC.width;
  const colors = ['#ff4455','#ff9900','#ffee00','#44ee44','#44aaff','#dd44ff','#ff88cc'];
  colors.forEach((color, i) => {
    setTimeout(() => {
      rareStars.push({
        type: 'shoot',
        x: W * (0.1 + Math.random() * 0.8), y: -10,
        vx: (Math.random() - 0.5) * 240,
        vy: 180 + Math.random() * 120,
        life: 1.1, max: 1.1,
        color, tail: 65
      });
    }, i * 90);
  });
}

// Firework burst — triggered on score milestones
function triggerFirework() {
  const W = bgC.width, H = bgC.height;
  const x = W * (0.25 + Math.random() * 0.5);
  const y = H * (0.15 + Math.random() * 0.35);
  const fwColors = ['#ffd700','#ff6ad5','#c774e8','#ad8cff','#8795e8','#7af8d0','#f8f770'];
  for (let i = 0; i < 55; i++) {
    const ang = (i / 55) * Math.PI * 2, spd = 5 + Math.random() * 6;
    parts.push({
      x, y,
      vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 2,
      r: Math.random() * 2.5 + 0.8, a: 1,
      dec: Math.random() * 0.025 + 0.018,
      col: fwColors[Math.floor(Math.random() * fwColors.length)],
      g: 0.12
    });
  }
}

// Surprise message popup (floats up and fades)
function showSurpriseMsg(txt) {
  const el = document.createElement('div');
  el.textContent = txt;
  el.style.cssText = `position:fixed;left:50%;top:35%;transform:translateX(-50%);
    font-size:1.3rem;font-weight:900;color:#fff;z-index:300;pointer-events:none;
    text-shadow:0 0 20px #ffd700,0 2px 4px rgba(0,0,0,.8);
    animation:popUp 2.5s ease-out forwards`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// Check all surprise conditions — called after each correct answer
function checkSurprises() {
  // 🌍 Earth: no wrong, no miss, ≤12s left, at least 5 correct
  if (!earthObj && wrong === 0 && miss === 0 && timeLeft <= 12 && correct >= 5) {
    initEarth();
    triggerFirework(); triggerFirework();
  }

  // 🌈 Rainbow shower: every 5 combos
  if (combo >= 5 && combo % 5 === 0 && combo !== lastComboSurprise) {
    lastComboSurprise = combo;
    triggerRainbowShower();
    showSurpriseMsg(combo >= 10 ? `🌟 ${combo} COMBO!!` : `✨ ${combo} COMBO!`);
  }
}

// Score milestone check — called after score update
let lastMilestone = 0;
function checkMilestone() {
  const milestones = [300, 600, 1000, 1500, 2000, 3000];
  for (const m of milestones) {
    if (score >= m && lastMilestone < m) {
      lastMilestone = m;
      triggerFirework();
      showSurpriseMsg(`⭐ ${m.toLocaleString()} pts!`);
      break;
    }
  }
}

// ══════════════════════════════════════════════════════════════
//  PARTICLE EFFECTS
// ══════════════════════════════════════════════════════════════
let parts = [];
const POP_COLORS = ['#fcd34d','#a78bfa','#60a5fa','#4ade80','#f9a8d4','#ffffff','#f97316'];

function spawnParts(x, y) {
  const n = 45 + Math.floor(Math.random() * 20);
  for (let i = 0; i < n; i++) {
    const ang = Math.random() * Math.PI * 2, spd = Math.random() * 9 + 2.5;
    parts.push({
      x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 3.5,
      r: Math.random() * 3 + .8, a: 1,
      dec: Math.random() * .03 + .02,
      col: POP_COLORS[Math.floor(Math.random() * POP_COLORS.length)],
      g: .22
    });
  }
}

function drawParts() {
  pX.clearRect(0, 0, pC.width, pC.height);
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx; p.y += p.vy; p.vy += p.g; p.vx *= .96;
    p.a -= p.dec;
    if (p.a <= 0) { parts.splice(i, 1); continue; }
    pX.beginPath(); pX.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    pX.fillStyle = p.col; pX.globalAlpha = p.a; pX.fill();
  }
  pX.globalAlpha = 1;
}

function doFlash(col) {
  const f = document.getElementById('flash');
  f.style.background = col; f.style.opacity = '.28';
  f.style.transition = '';
  setTimeout(() => { f.style.transition = 'opacity .45s'; f.style.opacity = '0'; }, 60);
  setTimeout(() => { f.style.transition = ''; }, 560);
}

let curLevel = '3', curMode = 'reading';
const POS_LABELS = {n:'名詞', v:'動詞', adj:'形容詞', adv:'副詞', prep:'前置詞', phrase:'熟語', other:'その他'};
// Japanese label → internal code (for CSV import)
const POS_FROM_JA = {'名詞':'n','動詞':'v','形容詞':'adj','副詞':'adv','前置詞':'prep','熟語':'phrase','その他':'other','未分類':''};
let curPosFilter = []; // [] = all; ['n'] or ['n','v'] = specific

function pickLevel(lv) { curLevel = lv; startGame(lv); }

function setMode(m) {
  curMode = m;
  document.getElementById('modeReading').classList.toggle('active', m === 'reading');
  document.getElementById('modeWriting').classList.toggle('active', m === 'writing');
}

function togglePosFilter(pos) {

    curPosFilter = [];
  } else {
    const idx = curPosFilter.indexOf(pos);
    if (idx >= 0) {
      curPosFilter.splice(idx, 1);
    } else {

    }
  }
  // Update button styles

  document.getElementById('pf_all').classList.toggle('active', all);
  ['n','v','adj','adv','prep','phrase','other'].forEach(p => {
    const el = document.getElementById('pf_' + p);

    el.className = 'pf-btn' + (on ? ' active ' + p : '');
  });
  // Hint
  const hint = document.getElementById('posHint');
  hint.textContent = curPosFilter.length === 0
    ? '' : `${curPosFilter.map(p => POS_LABELS[p]).join(' + ')} しばり（最大2種類）`;
}

function checkUnlock() {
  const best = parseInt(localStorage.getItem('wf_best_' + curLevel) || '0');
  const ok = best >= 500;
  const mw = document.getElementById('modeWriting');
  mw.classList.toggle('locked', !ok);
  document.getElementById('unlockHint').textContent =
    ok ? '' : `Writing モードは ${curLevel} 級で 500点 以上でアンロック (現在: ${best}点)`;
}
document.getElementById('levelScreen').addEventListener('transitionend', checkUnlock);

// ══════════════════════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════════════════════
const SPEEDS   = { '4': 7, '3': 9.5, 'pre2': 13, '2': 17 };  // % gameArea height / sec
const TOTAL_T  = 60;  // seconds
const PEN_WRN  = 5;   // time penalty wrong answer
const PEN_MISS = 7;   // time penalty miss

let running = false, locked = false;
let score = 0, combo = 0, maxCombo = 0, correct = 0, wrong = 0, miss = 0;
let timeLeft = TOTAL_T;
let wordQueue = [], wIdx = 0;
let fw = null;         // single falling word object
let fwCol = 0;         // alternate columns
let choices = [];      // [{ja, isCorrect, hidden}]
let activePhase = 0;   // 0=4ch, 1=3ch, 2=2ch, 3=1ch
let lastTs = null;

function startGame(lv) {
  curLevel = lv;
  showScreen('gameScreen');
  if (bgmPref && !bgmOn) startBGM();

  score = 0; combo = 0; maxCombo = 0; correct = 0; wrong = 0; miss = 0;
  timeLeft = TOTAL_T; locked = false; running = true;
  fw = null; fwCol = 0; choices = []; activePhase = 0; lastTs = null;
  earthObj = null; lastComboSurprise = 0; lastMilestone = 0;

  document.getElementById('gameArea').innerHTML = '';
  setBtns([]);

  let allWords = wDB[lv] || [];
  let words = allWords;
  if (curPosFilter.length > 0) {
    words = allWords.filter(w => curPosFilter.includes(w.pos || 'other'));
    if (words.length < 4) {
      alert(`選択した品詞（${curPosFilter.map(p=>POS_LABELS[p]).join('+')}）の単語が${words.length}語しかありません。\nすべての品詞から出題します。`);
      words = allWords;
    }
  }
  if (words.length < 4) { alert('単語が少なすぎます。管理画面で単語を追加してください。'); return; }
  wordQueue = shuffle([...words, ...words, ...words]);
  wIdx = 0;

  updateHUD();
}

// ══════════════════════════════════════════════════════════════
//  GAME LOOP  (runs inside main rAF loop)
// ══════════════════════════════════════════════════════════════
function tickGame(ts) {
  if (!running) return;
  if (!lastTs) { lastTs = ts; return; }
  const dt = Math.min((ts - lastTs) / 1000, .1);
  lastTs = ts;

  // Timer
  timeLeft = Math.max(0, timeLeft - dt);
  updateHUD();
  if (timeLeft <= 0) { endGame(false); return; }

  const ga   = document.getElementById('gameArea');
  const gaH  = ga.clientHeight;
  const spd  = SPEEDS[curLevel]; // % per second

  // Spawn if no word (not during locked feedback period)
  if (!fw && !locked) { spawnWord(gaH); return; }
  if (!fw) return;

  // Advance position
  fw.yPct += spd * dt;

  // Update DOM
  if (fw.el) {
    fw.el.style.top = (fw.yPct / 100 * gaH) + 'px';
    fw.el.classList.toggle('urgent', fw.yPct > 68);
  }

  // Reduce choices based on progress
  const phase = fw.yPct < 25 ? 0 : fw.yPct < 50 ? 1 : fw.yPct < 75 ? 2 : 3;
  if (phase > activePhase) {
    activePhase = phase;
    // Hide one distractor per phase increase
    const vis = choices.filter(c => !c.isCorrect && !c.hidden);
    if (vis.length > 0) { vis[0].hidden = true; setBtns(choices); }
  }

  // Earth surprise: check on every tick (timer-based trigger)
  if (!earthObj && wrong === 0 && miss === 0 && timeLeft <= 12 && correct >= 5) {
    initEarth();
    triggerFirework(); triggerFirework();
  }

  // Mid-point re-pronunciation
  if (fw.yPct >= 50 && !fw.midSpoken) {
    fw.midSpoken = true;
    speakWord(fw.word.en);
  }

  // Miss
  if (fw.yPct >= 95) {
    onMiss();
  }
}

function spawnWord(gaH) {
  if (gaH <= 0 || wIdx >= wordQueue.length) return;
  const word = wordQueue[wIdx++];
  fwCol = 1 - fwCol; // alternate columns
  const xPct = fwCol === 0 ? 25 : 75;

  // Build choices (distractors from the same filtered pool when possible)
  let poolSrc = wDB[curLevel] || [];
  if (curPosFilter.length > 0) {
    const filtered = poolSrc.filter(w => curPosFilter.includes(w.pos || 'other'));
    if (filtered.length >= 4) poolSrc = filtered;
  }
  const pool = poolSrc.filter(w => w.ja !== word.ja).map(w => w.ja);
  const distr = shuffle(pool).slice(0, 3);
  choices = shuffle([
    {ja: word.ja, isCorrect: true, hidden: false},
    ...distr.map(j => ({ja: j, isCorrect: false, hidden: false}))
  ]);
  activePhase = 0;
  setBtns(choices);

  // DOM element
  const el = document.createElement('div');
  el.className = 'fword';
  el.textContent = word.en;
  el.style.left = xPct + '%';
  el.style.top = '-60px';
  document.getElementById('gameArea').appendChild(el);

  fw = {word, xPct, yPct: -10, el, midSpoken: false};
  speakWord(word.en);
}

function handleChoice(idx) {
  if (!running || locked || !fw) return;
  const ch = choices[idx];
  if (!ch || ch.hidden) return;
  const btn = document.getElementById('c' + idx);
  if (ch.isCorrect) {
    onCorrect(btn);
  } else {
    onWrong(btn);
  }
}

function onCorrect(btn) {
  locked = true;
  correct++;
  combo++;
  if (combo > maxCombo) maxCombo = combo;

  const y = fw.yPct;
  const base = y < 25 ? 100 : y < 50 ? 75 : y < 75 ? 50 : 25;
  const pts  = base * Math.min(combo, 5);
  score += pts;
  checkSurprises();
  checkMilestone();

  btn.classList.add('cor');
  doFlash('#4ade80');
  speakWord(fw.word.en);
  sndCorrect(combo);

  const rect = btn.getBoundingClientRect();
  spawnParts(rect.left + rect.width / 2, rect.top + rect.height / 2);
  showScorePop(rect.left + rect.width / 2, rect.top, '+' + pts);

  // Remove word — capture element ref BEFORE clearing fw (setTimeout closure uses global fw)
  const doneEl = fw.el;
  doneEl.classList.add('answered');
  setTimeout(() => { if (doneEl.parentNode) doneEl.parentNode.removeChild(doneEl); }, 350);
  fw = null;

  setTimeout(() => { btn.classList.remove('cor'); locked = false; updateHUD(); }, 320);
  updateHUD();
}

function onWrong(btn) {
  locked = true;
  wrong++;
  combo = 0;
  timeLeft = Math.max(0, timeLeft - PEN_WRN);

  btn.classList.add('wrng');
  doFlash('#f87171');
  sndWrong();
  speakWord(fw.word.en);
  showTimePenalty('-' + PEN_WRN + 's');

  setTimeout(() => { btn.classList.remove('wrng'); locked = false; updateHUD(); }, 420);
  updateHUD();
}

function onMiss() {
  miss++;
  combo = 0;
  timeLeft = Math.max(0, timeLeft - PEN_MISS);

  if (fw.el && fw.el.parentNode) fw.el.parentNode.removeChild(fw.el);
  fw = null;

  doFlash('#f97316');
  sndMiss();
  showTimePenalty('-' + PEN_MISS + 's');
  setBtns([]);
  updateHUD();
}

function showScorePop(x, y, txt) {
  const el = document.createElement('div');
  el.className = 'spop';
  el.textContent = txt;
  el.style.cssText = `left:${x}px;top:${y}px;transform:translateX(-50%);` +
    `color:${combo >= 5 ? '#f97316' : combo >= 3 ? '#fcd34d' : '#4ade80'}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1350);
}

function showTimePenalty(txt) {
  const tw = document.getElementById('timerWrap');
  const rect = tw.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'spop';
  el.textContent = txt;
  el.style.cssText = `left:${rect.left + rect.width * .7}px;top:${rect.top}px;color:#f87171;font-size:1rem`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function setBtns(ch) {
  ['c0','c1','c2','c3'].forEach((id, i) => {
    const btn = document.getElementById(id);
    btn.classList.remove('cor','wrng');
    if (!ch || !ch[i]) { btn.textContent = ''; btn.classList.add('chide'); }
    else { btn.textContent = ch[i].ja; btn.classList.toggle('chide', ch[i].hidden); }
  });
}

function updateHUD() {
  document.getElementById('scoreEl').textContent = score.toLocaleString();
  const ce = document.getElementById('comboEl');
  ce.textContent = combo >= 2 ? combo + '× COMBO!' : '';
  ce.style.color = combo >= 5 ? '#f97316' : combo >= 3 ? '#fcd34d' : '#a78bfa';

  const pct = timeLeft / TOTAL_T * 100;
  const tb  = document.getElementById('timerBar');
  tb.style.width = pct + '%';
  tb.style.background = pct > 50
    ? 'linear-gradient(90deg,#4ade80,#60a5fa)'
    : pct > 25 ? 'linear-gradient(90deg,#fcd34d,#f97316)'
    : 'linear-gradient(90deg,#f87171,#dc2626)';
  document.getElementById('timerTxt').textContent = Math.ceil(timeLeft);
}

function endGame(silent) {
  running = false;
  if (fw && fw.el && fw.el.parentNode) fw.el.parentNode.removeChild(fw.el);
  fw = null;

  if (silent) return;

  // Save best score
  const key = 'wf_best_' + curLevel;
  const prev = parseInt(localStorage.getItem(key) || '0');
  if (score > prev) localStorage.setItem(key, score);

  // Result
  document.getElementById('finalPts').textContent = score.toLocaleString();
  document.getElementById('sCor').textContent = correct;
  document.getElementById('sWrn').textContent = wrong;
  document.getElementById('sMis').textContent = miss;
  document.getElementById('sMax').textContent = maxCombo;

  const acc = correct + wrong > 0 ? Math.round(correct / (correct + wrong) * 100) : 0;
  document.getElementById('rankMsg').textContent =
    score >= 2000 ? '🏆 Excellent! 素晴らしい！' :
    score >= 1000 ? '⭐ Great! よくできました！' :
    score >= 500  ? '👍 Good! がんばりました！' : '💪 Keep going! 練習しよう！';

  showScreen('resultScreen');
}

// ══════════════════════════════════════════════════════════════
//  MAIN ANIMATION LOOP
// ══════════════════════════════════════════════════════════════
function mainLoop(ts) {
  drawBG(ts);
  drawParts();
  tickGame(ts);
  requestAnimationFrame(mainLoop);
}

// ══════════════════════════════════════════════════════════════
//  ADMIN PANEL
// ══════════════════════════════════════════════════════════════
let adminLv = '3', editIdx = -1, adminPosFilter = '';

function initAdmin() { adminLv = '4'; adminPosFilter = ''; renderAdmin(); }

function switchTab(lv) {
  adminLv = lv; adminPosFilter = '';
  ['4','3','pre2','2'].forEach(l => document.getElementById('at' + l).classList.toggle('active', l === lv));
  updateAdminPosButtons();
  renderAdmin();
}

function setAdminPosFilter(f) {
  adminPosFilter = f;
  updateAdminPosButtons();
  renderAdmin();
}

function updateAdminPosButtons() {
  const keys = ['', 'n','v','adj','adv','prep','phrase','other','__unclassified'];
  keys.forEach(k => {
    const id = 'apf_' + k;
    const el = document.getElementById(id);
    if (!el) return;
    const on = adminPosFilter === k;
    el.className = 'pf-btn' + (on ? ' active' + (k && k !== '__unclassified' ? ' ' + k : '') : '');
  });
}

function renderAdmin() {
  const all = wDB[adminLv] || [];
  // apply filter
  let words, indices;
  if (!adminPosFilter) {
    words = all; indices = all.map((_, i) => i);
  } else if (adminPosFilter === '__unclassified') {
    indices = all.map((w, i) => (!w.pos || w.pos === '') ? i : -1).filter(i => i >= 0);
    words = indices.map(i => all[i]);
  } else {
    indices = all.map((w, i) => (w.pos || '') === adminPosFilter ? i : -1).filter(i => i >= 0);
    words = indices.map(i => all[i]);
  }
  const total = all.length;
  document.getElementById('wcount').textContent =
    words.length === total ? `${total} 語` : `${words.length} / ${total} 語`;
  const list = document.getElementById('wlist');
  list.innerHTML = '';
  words.forEach((w, row) => {
    const realIdx = indices[row]; // index in the actual wDB array for edit/delete
    const pos = w.pos || '';
    const posLabel = POS_LABELS[pos] || '未分類';
    const posCls = pos || 'unclassified';
    const d = document.createElement('div'); d.className = 'wrow';
    d.innerHTML = `<span class="wen">${esc(w.en)}</span><span class="wja">${esc(w.ja)}</span>`
      + `<span class="pos-badge ${posCls}">${esc(posLabel)}</span>`
      + `<button class="btn-sm btn-edit" onclick="openEdit(${realIdx})">✏</button>`
      + `<button class="btn-sm btn-del" onclick="delWord(${realIdx})">✕</button>`;
    list.appendChild(d);
  });
}

function clearAllWords() {
  const n = (wDB[adminLv] || []).length;
  if (!confirm(`${adminLv}級の単語を全て削除しますか？\n（${n}語が削除されます）`)) return;
  wDB[adminLv] = []; saveDB(); adminPosFilter = ''; updateAdminPosButtons(); renderAdmin();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addWord() {
  const en = document.getElementById('newEn').value.trim();
  const ja = document.getElementById('newJa').value.trim();
  const pos = document.getElementById('newPos').value;
  if (!en || !ja) { alert('英語と日本語を入力してください'); return; }
  if (!wDB[adminLv]) wDB[adminLv] = [];
  wDB[adminLv].push({en, ja, pos}); saveDB();
  document.getElementById('newEn').value = ''; document.getElementById('newJa').value = '';
  renderAdmin();
}

function delWord(i) {
  if (!confirm('削除しますか？')) return;
  wDB[adminLv].splice(i, 1); saveDB(); renderAdmin();
}

function openEdit(i) {
  editIdx = i;
  const w = wDB[adminLv][i];
  document.getElementById('eEn').value = w.en;
  document.getElementById('eJa').value = w.ja;
  document.getElementById('ePos').value = w.pos || '';
  document.getElementById('editModal').classList.remove('hidden');
}
function closeEdit() { document.getElementById('editModal').classList.add('hidden'); editIdx = -1; }
function saveEdit() {
  if (editIdx < 0) return;
  const en = document.getElementById('eEn').value.trim();
  const ja = document.getElementById('eJa').value.trim();
  const pos = document.getElementById('ePos').value;
  if (!en || !ja) { alert('英語と日本語を入力してください'); return; }
  wDB[adminLv][editIdx] = {en, ja, pos}; saveDB(); closeEdit(); renderAdmin();
}

function doExportJSON() {
  const blob = new Blob([JSON.stringify(wDB[adminLv] || [], null, 2)], {type:'application/json'});
  dl(blob, `words_${adminLv}.json`);
}
function doExportCSV() {
  // Format: English,日本語,品詞  (Japanese labels, with header row)
  const header = 'English,日本語,品詞';
  const rows = (wDB[adminLv] || []).map(w => {
    const posJa = POS_LABELS[w.pos || ''] || '未分類';
    return `${w.en},${w.ja},${posJa}`;
  });
  dl(new Blob(['\ufeff' + [header, ...rows].join('\n')], {type:'text/csv;charset=utf-8'}), `words_${adminLv}.csv`);
}
function dl(blob, name) {
  const u = URL.createObjectURL(blob), a = document.createElement('a');
  a.href = u; a.download = name; a.click(); URL.revokeObjectURL(u);
}

const VALID_POS = new Set(['n','v','adj','adv','prep','phrase','other']);
function parsePos(raw) {
  if (!raw) return '';
  const t = raw.trim();
  if (VALID_POS.has(t)) return t;          // internal code (from JSON)
  if (t in POS_FROM_JA) return POS_FROM_JA[t]; // Japanese label (from CSV)
  return '';
}
function onFileSelected(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const isJSON = file.name.toLowerCase().endsWith('.json');
    let v = [];
    if (isJSON) {
      try {
        const arr = JSON.parse(text);
        if (!Array.isArray(arr)) throw 0;
        v = arr.filter(w => w.en && w.ja).map(w => ({
          en: w.en, ja: w.ja, pos: parsePos(w.pos)
        }));
      } catch(err) { alert('JSONの形式が正しくありません'); input.value=''; return; }
    } else {
      // CSV: English,日本語,品詞  (first row may be header)
      const lines = text.split('\n').filter(l => l.trim());
      v = lines.map(l => {
        const p = l.split(',');
        if (p.length < 2) return null;
        // Skip header row (English/en etc.)
        if (/^(English|english|en)$/i.test(p[0].trim())) return null;
        const posRaw = p.length >= 3 ? p[2] : '';
        return {en:p[0].trim(), ja:p[1].trim(), pos: parsePos(posRaw)};
      }).filter(Boolean);
    }
    if (!wDB[adminLv]) wDB[adminLv] = [];
    wDB[adminLv].push(...v); saveDB(); renderAdmin();
    alert(`${v.length}語をインポートしました`);
    input.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

// ══════════════════════════════════════════════════════════════
//  SOUND  (Web Audio API — no external files needed)
// ══════════════════════════════════════════════════════════════
let _ac = null;
function ac() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}

function playTone(freq, type, vol, attack, decay, start) {
  const ctx = ac(), t = ctx.currentTime + (start || 0);
  const osc = ctx.createOscillator();
  const g   = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.type = type; osc.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + attack);
  g.gain.exponentialRampToValueAtTime(0.0001, t + attack + decay);
  osc.start(t); osc.stop(t + attack + decay + 0.05);
}

function sndCorrect(combo) {
  // Glass-like ascending chime, higher pitch with combo
  const base = combo >= 5 ? 659 : combo >= 3 ? 587 : 523;
  playTone(base,        'sine',     0.22, 0.01, 0.28, 0);
  playTone(base * 1.25, 'sine',     0.18, 0.01, 0.22, 0.07);
  if (combo >= 3) playTone(base * 1.5, 'sine', 0.14, 0.01, 0.2, 0.14);
}

function sndWrong() {
  playTone(220, 'sawtooth', 0.18, 0.005, 0.15, 0);
  playTone(165, 'sawtooth', 0.12, 0.005, 0.12, 0.08);
}

function sndMiss() {
  const ctx = ac(), t = ctx.currentTime;
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(300, t);
  osc.frequency.exponentialRampToValueAtTime(80, t + 0.5);
  g.gain.setValueAtTime(0.18, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
  osc.start(t); osc.stop(t + 0.55);
}

// ── Text-to-Speech ────────────────────────────────────────────
let _ttsVoice = null;

// Pick the best English voice available
function getTTSVoice() {
  if (_ttsVoice) return _ttsVoice;
  const voices = speechSynthesis.getVoices();
  // Prefer en-US/en-GB, then any English voice
  _ttsVoice = voices.find(v => v.lang === 'en-US' && !v.localService === false)
    || voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang === 'en-GB')
    || voices.find(v => v.lang.startsWith('en'))
    || voices[0];
  return _ttsVoice;
}
// Voices load asynchronously on some browsers
speechSynthesis.onvoiceschanged = () => { _ttsVoice = null; };

function speakWord(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel(); // stop any previous utterance
  const u = new SpeechSynthesisUtterance(text);
  u.voice = getTTSVoice();
  u.lang  = 'en-US';
  u.rate  = 0.88;   // slightly slower = clearer for learners
  u.pitch = 1.0;
  u.volume = 1.0;
  speechSynthesis.speak(u);
}

// Unlock AudioContext on first touch (required on iOS/mobile)
document.addEventListener('pointerdown', () => { try { ac(); } catch(e) {} }, { once: true });

// ══════════════════════════════════════════════════════════════
//  BACKGROUND MUSIC  (procedural — no external files)
// ══════════════════════════════════════════════════════════════
// Chord progression: Am7 → Fmaj7 → Cmaj7 → G7 (loops every 8 bars)
const BGM_BPM = 82;
const BGM_BEAT = 60 / BGM_BPM;
const BGM_BAR  = BGM_BEAT * 4;
const BGM_BPC  = 2; // bars per chord

const BGM_PROG = [
  { // Am7 — dark, mysterious root
    pad:  [110.00, 220.00, 261.63, 329.63, 392.00],
    arp:  [329.63, 392.00, 440.00, 523.25, 440.00, 392.00, 329.63, 261.63],
    bass: 55.00
  },
  { // Fmaj7 — warm lift
    pad:  [174.61, 220.00, 261.63, 349.23],
    arp:  [261.63, 349.23, 440.00, 349.23, 261.63, 220.00, 261.63, 349.23],
    bass: 87.31
  },
  { // Cmaj7 — bright resolve
    pad:  [130.81, 261.63, 329.63, 392.00, 493.88],
    arp:  [261.63, 329.63, 392.00, 523.25, 392.00, 329.63, 392.00, 329.63],
    bass: 65.41
  },
  { // G7 — tension, leads back to Am
    pad:  [98.00, 196.00, 246.94, 293.66, 369.99],
    arp:  [246.94, 293.66, 369.99, 392.00, 369.99, 293.66, 246.94, 196.00],
    bass: 98.00
  }
];
const BGM_LOOP = BGM_PROG.length * BGM_BPC;

let bgmOn  = false, bgmTimer = null, bgmNextT = 0, bgmBar = 0;
let _revBus = null;

function getRevBus() {
  if (_revBus) return _revBus;
  const ctx = ac();
  // Simple tape-delay reverb: delay → lowpass → feedback → output
  const delay  = ctx.createDelay(1.5);
  const fbGain = ctx.createGain();  fbGain.gain.value = 0.38;
  const lpFilt = ctx.createBiquadFilter(); lpFilt.type = 'lowpass'; lpFilt.frequency.value = 1600;
  const outGain = ctx.createGain();  outGain.gain.value = 0.4;
  delay.connect(lpFilt); lpFilt.connect(fbGain); fbGain.connect(delay);
  delay.connect(outGain); outGain.connect(ctx.destination);
  _revBus = delay;
  return _revBus;
}

function bgmPad(ch, t, dur) {
  const ctx = ac(), rev = getRevBus();
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.036, t + 0.9);
  g.gain.setValueAtTime(0.036, t + dur - 0.7);
  g.gain.linearRampToValueAtTime(0, t + dur + 0.15);
  g.connect(ctx.destination);
  g.connect(rev); // wet send
  ch.pad.forEach(f => {
    [1, 1.0035, 2, 2.005].forEach(mult => { // octave doublings + slight detune
      const o = ctx.createOscillator();
      o.type = 'sine'; o.frequency.value = f * mult;
      // upper octaves quieter
      const og = ctx.createGain(); og.gain.value = mult > 1.5 ? 0.45 : 1;
      o.connect(og); og.connect(g);
      o.start(t); o.stop(t + dur + 0.2);
    });
  });
}

function bgmBass(ch, t, dur) {
  const ctx = ac();
  const filt = ctx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 260;
  const g = ctx.createGain();
  g.connect(filt); filt.connect(ctx.destination);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.13, t + 0.12);
  g.gain.setValueAtTime(0.13, t + dur - 0.2);
  g.gain.linearRampToValueAtTime(0, t + dur);
  // root + octave
  [ch.bass, ch.bass * 2].forEach((f, i) => {
    const o = ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
    const og = ctx.createGain(); og.gain.value = i === 0 ? 1 : 0.35;
    o.connect(og); og.connect(g);
    o.start(t); o.stop(t + dur + 0.1);
  });
}

function bgmArp(ch, t) {
  const ctx = ac(), rev = getRevBus();
  const eighth = BGM_BEAT * 0.5;
  ch.arp.forEach((f, i) => {
    const nt = t + i * eighth;
    const g = ctx.createGain();
    g.connect(ctx.destination);
    g.connect(rev);
    g.gain.setValueAtTime(0, nt);
    g.gain.linearRampToValueAtTime(0.02, nt + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, nt + eighth * 0.72);
    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
    o.connect(g); o.start(nt); o.stop(nt + eighth);
  });
}

function bgmSchedule() {
  if (!bgmOn) return;
  const ctx = ac();
  while (bgmNextT < ctx.currentTime + 0.4) {
    const barInLoop  = bgmBar % BGM_LOOP;
    const chordIdx   = Math.floor(barInLoop / BGM_BPC);
    const barInChord = barInLoop % BGM_BPC;
    const ch = BGM_PROG[chordIdx];
    if (barInChord === 0) { bgmPad(ch, bgmNextT, BGM_BAR * BGM_BPC); bgmBass(ch, bgmNextT, BGM_BAR * BGM_BPC); }
    bgmArp(ch, bgmNextT);
    bgmNextT += BGM_BAR;
    bgmBar++;
  }
  bgmTimer = setTimeout(bgmSchedule, 150);
}

function startBGM() {
  if (bgmOn) return;
  bgmOn = true;
  bgmNextT = ac().currentTime + 0.05;
  bgmBar = 0;
  bgmSchedule();
  updateBGMBtn();
}

function stopBGM() {
  bgmOn = false;
  if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
  updateBGMBtn();
}

let bgmPref = localStorage.getItem('wf_bgm') !== '0'; // default on

function toggleBGM() {
  bgmOn ? stopBGM() : startBGM();
  bgmPref = bgmOn;
  localStorage.setItem('wf_bgm', bgmPref ? '1' : '0');
}

function updateBGMBtn() {
  const btn = document.getElementById('bgmBtn');
  if (!btn) return;
  btn.textContent = bgmOn ? '♪' : '♪';
  btn.classList.toggle('on', bgmOn);
  btn.style.opacity = bgmOn ? '1' : '.45';
}

// ══════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════
function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

resizeCanvases();
requestAnimationFrame(mainLoop);
