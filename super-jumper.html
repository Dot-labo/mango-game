<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Jumper – SAKURA KIDS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0520;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
  height: 100vh;
  user-select: none;
}
#bgCanvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 10; transition: opacity 0.35s;
}
.screen.hidden { opacity: 0; pointer-events: none; }

/* ── TITLE ── */
#titleScreen { background: radial-gradient(ellipse at 50% 40%, #2a0e6a 0%, #0a0520 70%); }
.title-mascot {
  font-size: 80px;
  animation: titleBounce 1.8s ease-in-out infinite;
  filter: drop-shadow(0 0 22px rgba(160,80,255,0.7));
  margin-bottom: 6px;
}
@keyframes titleBounce {
  0%,100% { transform: translateY(0) rotate(-6deg); }
  50%      { transform: translateY(-22px) rotate(6deg); }
}
.title-h1 {
  font-size: clamp(44px, 9vw, 80px);
  font-weight: 900;
  line-height: 1;
  background: linear-gradient(135deg, #c084ff 0%, #ff80c8 50%, #ffd860 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px; text-align: center;
}
.title-sub {
  font-size: clamp(13px, 2vw, 17px);
  color: #9070d0; letter-spacing: 3px; text-transform: uppercase;
  margin: 8px 0 32px;
}
.btn-start {
  padding: 16px 52px; font-size: 22px; font-weight: 800;
  background: linear-gradient(135deg, #c084ff, #ff80c8);
  border: none; border-radius: 50px; color: #fff; cursor: pointer;
  box-shadow: 0 6px 28px rgba(180,80,255,0.5);
  transition: transform 0.15s; letter-spacing: 1px;
  animation: btnPulse 2s infinite;
}
.btn-start:hover  { transform: scale(1.06); }
.btn-start:active { transform: scale(0.97); }
@keyframes btnPulse {
  0%,100% { box-shadow: 0 6px 28px rgba(180,80,255,0.5); }
  50%      { box-shadow: 0 6px 42px rgba(180,80,255,0.85); }
}

/* ── GAME SCREEN ── */
#gameScreen { background: transparent; justify-content: flex-start; }

#hud {
  width: 100%; max-width: 860px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; z-index: 20;
}
.hud-score { font-size: 20px; font-weight: 800; color: #ffd860; text-shadow: 0 0 10px rgba(255,210,80,0.5); }
.hud-lives { display: flex; gap: 5px; }
.heart { font-size: 22px; transition: all 0.3s; }
.heart.lost { opacity: 0.2; transform: scale(0.8); }
.hud-level {
  font-size: 15px; font-weight: 700; color: #c090ff;
  background: rgba(255,255,255,0.07); padding: 5px 14px;
  border-radius: 20px; border: 1px solid rgba(180,120,255,0.2);
}

#progressBar {
  width: calc(100% - 40px); max-width: 820px;
  height: 6px; background: rgba(255,255,255,0.08);
  border-radius: 3px; overflow: hidden; margin-bottom: 8px;
}
#progressFill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #c084ff, #ff80c8);
  border-radius: 3px; transition: width 0.55s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 8px rgba(200,100,255,0.6);
}

/* Prompt card */
#promptCard {
  background: rgba(255,255,255,0.96); border-radius: 22px;
  padding: 10px 22px; margin: 0 20px 10px;
  width: calc(100% - 40px); max-width: 820px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.3);
  animation: cardIn 0.4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes cardIn {
  from { transform: scale(0.85) translateY(-8px); opacity: 0; }
  to   { transform: scale(1) translateY(0);        opacity: 1; }
}
#promptEmoji {
  font-size: clamp(42px, 8vw, 64px);
  line-height: 1; filter: drop-shadow(0 3px 8px rgba(0,0,0,0.12)); flex-shrink: 0;
}
.prompt-text { flex: 1; }
.prompt-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 2px; }
#promptHint {
  font-size: clamp(24px, 4.5vw, 40px); font-weight: 900;
  color: #2d1060; letter-spacing: 8px; margin-top: 1px;
}
#qDots { display: flex; gap: 6px; margin-left: auto; flex-shrink: 0; }
.qdot {
  width: 9px; height: 9px; border-radius: 50%;
  background: rgba(0,0,0,0.12); transition: all 0.3s;
}
.qdot.done      { background: #5cb85c; }
.qdot.active    { background: #ff9a3c; animation: qdotPulse 1s infinite; }
.qdot.wrong-dot { background: #e05050; }
@keyframes qdotPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,154,60,0.5); }
  50%      { box-shadow: 0 0 0 4px rgba(255,154,60,0); }
}

/* Game area */
#gameArea {
  flex: 1; width: calc(100% - 40px); max-width: 820px;
  position: relative; overflow: hidden;
}

/* Platforms */
.platform {
  position: absolute; display: flex; flex-direction: column;
  align-items: center; cursor: pointer;
  transition: transform 0.2s;
  transform: translate(-50%, 0); /* center on x */
}
.platform:hover { transform: translate(-50%, -6px); }
.platform:active .plat-face { transform: translateY(4px); }

.plat-face {
  border-radius: 18px; display: flex; align-items: center; justify-content: center;
  font-size: clamp(15px, 2.5vw, 22px); font-weight: 900;
  color: #fff; letter-spacing: 2px; text-shadow: 0 2px 6px rgba(0,0,0,0.35);
  position: relative; overflow: hidden;
  box-shadow: 0 9px 0 rgba(0,0,0,0.25), 0 14px 24px rgba(0,0,0,0.2);
  transition: transform 0.15s, filter 0.15s;
}
.plat-face::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 44%; background: rgba(255,255,255,0.18);
  border-radius: 18px 18px 0 0; pointer-events: none;
}
.plat-stem {
  width: 60%; height: 10px; border-radius: 0 0 10px 10px;
  background: rgba(0,0,0,0.2);
}

.p-purple .plat-face { background: linear-gradient(145deg, #9c6bff, #5030cc); box-shadow: 0 9px 0 #3020a0, 0 14px 24px rgba(80,0,200,0.25); }
.p-pink   .plat-face { background: linear-gradient(145deg, #ff6baa, #cc3575); box-shadow: 0 9px 0 #aa2060, 0 14px 24px rgba(200,0,80,0.25); }
.p-cyan   .plat-face { background: linear-gradient(145deg, #4fc8ff, #0288d1); box-shadow: 0 9px 0 #0168a0, 0 14px 24px rgba(0,100,200,0.25); }
.p-green  .plat-face { background: linear-gradient(145deg, #6dffa0, #1b9050); box-shadow: 0 9px 0 #146038, 0 14px 24px rgba(0,130,60,0.25); }

.platform.correct .plat-face { animation: platOK 0.55s ease-out; }
.platform.wrong   .plat-face { animation: platNG 0.4s ease-out; }
@keyframes platOK {
  0%   { filter: brightness(1); }
  35%  { filter: brightness(2.2) drop-shadow(0 0 20px #4fffb0); transform: scale(1.12); }
  100% { filter: brightness(1); transform: scale(1); }
}
@keyframes platNG {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-9px) brightness(0.7); }
  40%     { transform: translateX(9px); filter: sepia(1) hue-rotate(-20deg) saturate(3); }
  60%     { transform: translateX(-6px); }
  80%     { transform: translateX(6px); }
}

/* Start platform */
#startPlatform {
  position: absolute; transform: translate(-50%, 0);
  display: flex; flex-direction: column; align-items: center;
}
#startFace {
  border-radius: 18px;
  background: linear-gradient(145deg, #706080, #403050);
  box-shadow: 0 8px 0 #201830, 0 12px 20px rgba(0,0,0,0.3);
}
#startFace::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 44%; background: rgba(255,255,255,0.1);
  border-radius: 18px 18px 0 0;
}

/* Monster */
#monster {
  position: absolute; z-index: 30;
  transition: filter 0.2s;
  pointer-events: none;
}
#monster svg {
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.45));
  display: block;
}

/* Toast */
#toast {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  z-index: 200; font-size: clamp(36px, 7vw, 64px); font-weight: 900;
  pointer-events: none; opacity: 0; white-space: nowrap;
  transition: transform 0.22s cubic-bezier(.175,.885,.32,1.275), opacity 0.28s;
}
#toast.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
#toast.t-ok  { color: #4fffb0; text-shadow: 0 0 24px rgba(79,255,176,0.7); }
#toast.t-ng  { color: #ff6060; text-shadow: 0 0 24px rgba(255,80,80,0.7); }

/* Particles */
.particle {
  position: fixed; pointer-events: none; z-index: 150; font-size: 20px;
  animation: particleFly 0.9s ease-out forwards;
}
@keyframes particleFly {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0.1); opacity: 0; }
}

/* ── RESULT ── */
#resultScreen { background: radial-gradient(ellipse at 50% 40%, #2a0e6a 0%, #0a0520 70%); gap: 16px; }
#resultMon {
  font-size: clamp(70px, 12vw, 100px);
  animation: resCelebrate 0.7s ease-in-out infinite alternate;
  filter: drop-shadow(0 0 26px rgba(200,100,255,0.7));
}
@keyframes resCelebrate {
  from { transform: rotate(-8deg) scale(1); }
  to   { transform: rotate(8deg) scale(1.12); }
}
#resultTitle {
  font-size: clamp(36px, 6vw, 60px); font-weight: 900;
  background: linear-gradient(135deg, #ffd860, #ff80c8, #80ffcc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.res-stats { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
.res-box {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px; padding: 14px 28px; text-align: center;
}
.res-num   { font-size: 38px; font-weight: 900; color: #ffd860; }
.res-label { font-size: 12px; color: #b090ff; text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }
.res-btns  { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
.btn-replay {
  padding: 14px 40px; font-size: 18px; font-weight: 800;
  background: linear-gradient(135deg, #c084ff, #ff80c8);
  border: none; border-radius: 40px; color: #fff; cursor: pointer;
  box-shadow: 0 4px 18px rgba(180,80,255,0.4); transition: transform 0.15s;
}
.btn-replay:hover { transform: scale(1.05); }
.btn-home-link {
  padding: 14px 32px; font-size: 17px; font-weight: 700;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 40px; color: rgba(255,255,255,0.8); cursor: pointer;
  text-decoration: none; display: flex; align-items: center;
  transition: background 0.2s, transform 0.15s;
}
.btn-home-link:hover { background: rgba(255,255,255,0.18); transform: scale(1.04); }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<!-- ── TITLE ── -->
<div class="screen" id="titleScreen">
  <div class="title-mascot">🦘</div>
  <div class="title-h1">Super<br>Jumper</div>
  <div class="title-sub">Spell it · Jump to it!</div>
  <button class="btn-start" id="btnStart">▶ Play!</button>
  <div style="margin-top:18px;color:#5a4080;font-size:13px;letter-spacing:1px;">Ages 4–7 · CVC Spelling</div>
</div>

<!-- ── GAME ── -->
<div class="screen hidden" id="gameScreen">
  <div id="hud">
    <div class="hud-score">⭐ <span id="scoreNum">0</span></div>
    <div class="hud-lives" id="livesRow"></div>
    <div class="hud-level" id="levelLabel">Level 1</div>
  </div>
  <div id="progressBar"><div id="progressFill"></div></div>

  <div id="promptCard">
    <div id="promptEmoji">🐱</div>
    <div class="prompt-text">
      <div class="prompt-label">How do you spell this?</div>
      <div id="promptHint">_ _ _</div>
    </div>
    <div id="qDots"></div>
  </div>

  <div id="gameArea">
    <!-- 4 platforms -->
    <div class="platform p-purple" id="plat-0">
      <div class="plat-face" id="pf-0" style="width:160px;height:60px;">cat</div>
      <div class="plat-stem"></div>
    </div>
    <div class="platform p-pink" id="plat-1">
      <div class="plat-face" id="pf-1" style="width:160px;height:60px;">bat</div>
      <div class="plat-stem"></div>
    </div>
    <div class="platform p-cyan" id="plat-2">
      <div class="plat-face" id="pf-2" style="width:160px;height:60px;">hat</div>
      <div class="plat-stem"></div>
    </div>
    <div class="platform p-green" id="plat-3">
      <div class="plat-face" id="pf-3" style="width:160px;height:60px;">dog</div>
      <div class="plat-stem"></div>
    </div>

    <!-- Start platform -->
    <div id="startPlatform">
      <div id="startFace" style="width:140px;height:50px;position:relative;"></div>
      <div class="plat-stem"></div>
    </div>

    <!-- Monster -->
    <div id="monster">
      <svg viewBox="0 0 80 95" width="72" height="86" xmlns="http://www.w3.org/2000/svg">
        <!-- Ears blue -->
        <polygon points="8,33 20,4 34,26"  fill="#3d82cc"/>
        <polygon points="46,26 60,4 72,33" fill="#3d82cc"/>
        <!-- Ear inner pink -->
        <polygon points="14,29 22,11 31,26" fill="#ff9ab0"/>
        <polygon points="49,26 58,11 66,29" fill="#ff9ab0"/>
        <!-- Head octagon green -->
        <polygon points="20,26 60,26 74,40 74,66 60,76 20,76 6,66 6,40" fill="#5cb85c"/>
        <!-- Head highlight -->
        <polygon points="20,26 60,26 74,40 65,40 52,26" fill="rgba(255,255,255,0.09)"/>
        <!-- Yellow bow -->
        <ellipse cx="29" cy="23" rx="14" ry="8" transform="rotate(-13,29,23)" fill="#f5d020"/>
        <ellipse cx="51" cy="23" rx="14" ry="8" transform="rotate(13,51,23)"  fill="#f5d020"/>
        <circle cx="40" cy="23" r="8" fill="#f5d020"/>
        <circle cx="40" cy="23" r="4" fill="#e8c000"/>
        <!-- Bow shine -->
        <ellipse cx="26" cy="20" rx="6" ry="3" transform="rotate(-13,26,20)" fill="rgba(255,255,255,0.35)"/>
        <ellipse cx="54" cy="20" rx="6" ry="3" transform="rotate(13,54,20)"  fill="rgba(255,255,255,0.35)"/>
        <!-- Eyebrow marks orange-red -->
        <rect x="11" y="33" width="18" height="7" rx="3.5" fill="#d04020"/>
        <rect x="51" y="33" width="18" height="7" rx="3.5" fill="#d04020"/>
        <!-- Eyes white -->
        <circle cx="27" cy="49" r="13" fill="white"/>
        <circle cx="53" cy="49" r="13" fill="white"/>
        <!-- Pupils -->
        <circle cx="28" cy="50" r="7"  fill="#1a1a1a"/>
        <circle cx="54" cy="50" r="7"  fill="#1a1a1a"/>
        <!-- Eye shine -->
        <circle cx="24" cy="45" r="4"  fill="white"/>
        <circle cx="50" cy="45" r="4"  fill="white"/>
        <circle cx="31" cy="53" r="2"  fill="rgba(255,255,255,0.5)"/>
        <circle cx="57" cy="53" r="2"  fill="rgba(255,255,255,0.5)"/>
        <!-- Muzzle blue -->
        <ellipse cx="40" cy="65" rx="19" ry="13" fill="#3d82cc"/>
        <ellipse cx="40" cy="59" rx="12" ry="5"  fill="rgba(255,255,255,0.13)"/>
        <!-- Nose -->
        <polygon points="37,60 43,60 40,65" fill="#111"/>
        <!-- Mouth happy -->
        <path d="M31,68 Q40,77 49,68" stroke="#e050a0" stroke-width="2.2" fill="none" stroke-linecap="round"/>
        <!-- Whiskers left -->
        <rect x="4"  y="62" width="16" height="4" rx="2" fill="#6040a8"/>
        <rect x="4"  y="70" width="16" height="4" rx="2" fill="#6040a8"/>
        <!-- Whiskers right -->
        <rect x="60" y="62" width="16" height="4" rx="2" fill="#6040a8"/>
        <rect x="60" y="70" width="16" height="4" rx="2" fill="#6040a8"/>
        <!-- Body/neck -->
        <rect x="22" y="74" width="36" height="20" rx="10" fill="#3d82cc"/>
        <rect x="28" y="76" width="10" height="12" rx="4" fill="rgba(255,255,255,0.12)"/>
      </svg>
    </div>
  </div>
</div>

<!-- ── RESULT ── -->
<div class="screen hidden" id="resultScreen">
  <div id="resultMon">🎉</div>
  <div id="resultTitle">Amazing!</div>
  <div class="res-stats">
    <div class="res-box"><div class="res-num" id="finalScore">0</div><div class="res-label">Stars</div></div>
    <div class="res-box"><div class="res-num" id="finalCorrect">0/24</div><div class="res-label">Correct</div></div>
    <div class="res-box"><div class="res-num" id="finalCombo">0</div><div class="res-label">Best Combo</div></div>
  </div>
  <div class="res-btns">
    <button class="btn-replay" id="btnReplay">🔄 Play Again!</button>
    <a href="index.html" class="btn-home-link">🏠 Home</a>
  </div>
</div>

<div id="toast"></div>

<script>
// ── BACKGROUND ──────────────────────────────────────────
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx    = bgCanvas.getContext('2d');
let clouds = [], bgStars = [];

function resizeBg() {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  initBg();
}
function initBg() {
  bgStars = [];
  for (let i = 0; i < 120; i++) {
    bgStars.push({
      x: Math.random() * bgCanvas.width,
      y: Math.random() * bgCanvas.height,
      r: Math.random() * 1.5 + 0.2,
      a: Math.random(), da: (Math.random()-0.5)*0.006,
      color: ['#fff','#c8b0ff','#ffd8a0'][Math.floor(Math.random()*3)]
    });
  }
  clouds = [];
  for (let i = 0; i < 7; i++) {
    clouds.push({
      x: Math.random() * bgCanvas.width,
      y: 60 + Math.random() * bgCanvas.height * 0.5,
      r: 40 + Math.random() * 80,
      a: 0.04 + Math.random() * 0.07,
      speed: 0.2 + Math.random() * 0.3
    });
  }
}
function drawBg() {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0, 0, w, h);

  // Sky gradient
  const g = bgCtx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, '#0a0230');
  g.addColorStop(0.5, '#1a0850');
  g.addColorStop(1, '#0e0535');
  bgCtx.fillStyle = g;
  bgCtx.fillRect(0, 0, w, h);

  // Stars
  bgStars.forEach(s => {
    s.a += s.da;
    if (s.a > 1) { s.a = 1; s.da = -Math.abs(s.da); }
    if (s.a < 0) { s.a = 0; s.da =  Math.abs(s.da); }
    bgCtx.globalAlpha = s.a;
    bgCtx.fillStyle = s.color;
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    bgCtx.fill();
  });
  bgCtx.globalAlpha = 1;

  // Clouds (soft glowing)
  clouds.forEach(c => {
    c.x += c.speed;
    if (c.x - c.r > w) c.x = -c.r;
    const cg = bgCtx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
    cg.addColorStop(0, `rgba(160,100,255,${c.a})`);
    cg.addColorStop(1, `rgba(160,100,255,0)`);
    bgCtx.fillStyle = cg;
    bgCtx.beginPath();
    bgCtx.arc(c.x, c.y, c.r, 0, Math.PI*2);
    bgCtx.fill();
  });
  requestAnimationFrame(drawBg);
}
window.addEventListener('resize', resizeBg);
resizeBg();
drawBg();

// ── GAME DATA ────────────────────────────────────────────
const LEVELS = [
  {
    name: 'Level 1', label: '⭐ First Steps',
    rounds: [
      { emoji:'🐱', answer:'cat',  hint:'c _ t',  choices:['cat','bat','hat','dog'] },
      { emoji:'🐶', answer:'dog',  hint:'d _ g',  choices:['log','dog','fog','hog'] },
      { emoji:'☀️', answer:'sun',  hint:'s _ n',  choices:['fun','bun','sun','run'] },
      { emoji:'🎩', answer:'hat',  hint:'h _ t',  choices:['bat','mat','cat','hat'] },
      { emoji:'🖊️', answer:'pen',  hint:'p _ n',  choices:['hen','ten','pen','den'] },
      { emoji:'🐟', answer:'fish', hint:'f _ sh', choices:['dish','fish','wish','miss'] },
      { emoji:'🐸', answer:'frog', hint:'fr _ g', choices:['frog','blog','clog','drag'] },
      { emoji:'🌕', answer:'moon', hint:'m _ _n', choices:['noon','moon','soon','boot'] },
    ]
  },
  {
    name: 'Level 2', label: '🌟 Fun With Words',
    rounds: [
      { emoji:'🌳', answer:'tree',  hint:'tr _ _',   choices:['free','tree','flee','knee'] },
      { emoji:'🚢', answer:'ship',  hint:'sh _ p',   choices:['chip','drip','ship','skip'] },
      { emoji:'🎂', answer:'cake',  hint:'c _ ke',   choices:['lake','bake','cake','fake'] },
      { emoji:'🦆', answer:'duck',  hint:'d _ ck',   choices:['luck','buck','duck','muck'] },
      { emoji:'🌂', answer:'rain',  hint:'r _ in',   choices:['main','pain','rain','gain'] },
      { emoji:'🌸', answer:'pink',  hint:'p _ nk',   choices:['rink','link','pink','sink'] },
      { emoji:'🪁', answer:'kite',  hint:'k _ te',   choices:['bite','mite','kite','site'] },
      { emoji:'🐻', answer:'bear',  hint:'b _ ar',   choices:['pear','dear','bear','fear'] },
    ]
  },
  {
    name: 'Level 3', label: '🏆 Champion Reader',
    rounds: [
      { emoji:'🏠', answer:'home',   hint:'h _ me',    choices:['dome','come','home','some'] },
      { emoji:'🌟', answer:'star',   hint:'st _ r',    choices:['scar','stir','star','spar'] },
      { emoji:'🍎', answer:'apple',  hint:'_ pp _ e',  choices:['maple','ample','apple','able'] },
      { emoji:'🦁', answer:'lion',   hint:'l _ on',    choices:['loin','lean','loan','lion'] },
      { emoji:'🎵', answer:'song',   hint:'s _ ng',    choices:['long','gong','tong','song'] },
      { emoji:'🌙', answer:'night',  hint:'n _ ght',   choices:['light','sight','night','tight'] },
      { emoji:'🐉', answer:'dragon', hint:'dr _ g _ n',choices:['dracon','dragon','dragan','dropout'] },
      { emoji:'🌈', answer:'rainbow',hint:'r _ inbow', choices:['raincoat','rainbow','raindrop','rainy'] },
    ]
  }
];

const PLAT_COLORS = ['p-purple','p-pink','p-cyan','p-green'];

// ── STATE ────────────────────────────────────────────────
let curLevel = 0, curRound = 0;
let score = 0, lives = 3, combo = 0, bestCombo = 0;
let correctCount = 0, totalRounds = 0;
let locked = false;
let monCX = 0, monCY = 0; // monster center-x, top-y (relative to gameArea)

const MONSTER_W = 72, MONSTER_H = 86;
const PLAT_W    = 160, PLAT_H   = 60;
const START_W   = 140, START_H  = 50;

// ── DOM ──────────────────────────────────────────────────
const titleScreen  = document.getElementById('titleScreen');
const gameScreen   = document.getElementById('gameScreen');
const resultScreen = document.getElementById('resultScreen');
const monsterEl    = document.getElementById('monster');
const scoreEl      = document.getElementById('scoreNum');
const livesRowEl   = document.getElementById('livesRow');
const levelLabelEl = document.getElementById('levelLabel');
const progressEl   = document.getElementById('progressFill');
const promptEmojiEl= document.getElementById('promptEmoji');
const promptHintEl = document.getElementById('promptHint');
const qDotsEl      = document.getElementById('qDots');
const gameAreaEl   = document.getElementById('gameArea');
const startPlatEl  = document.getElementById('startPlatform');
const toastEl      = document.getElementById('toast');

const platEls  = [0,1,2,3].map(i => document.getElementById('plat-' + i));
const pfEls    = [0,1,2,3].map(i => document.getElementById('pf-'   + i));

// ── SCREENS ──────────────────────────────────────────────
function showScreen(id) {
  [titleScreen, gameScreen, resultScreen].forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

document.getElementById('btnStart').addEventListener('click', startGame);
document.getElementById('btnReplay').addEventListener('click', startGame);

// ── START ────────────────────────────────────────────────
function startGame() {
  curLevel = 0; curRound = 0;
  score = 0; lives = 3; combo = 0; bestCombo = 0;
  correctCount = 0; locked = false;
  totalRounds = LEVELS.reduce((s,l) => s + l.rounds.length, 0);

  showScreen('gameScreen');
  buildLives();
  buildQDots();
  layoutGame();
  renderRound();
}

// ── LIVES ────────────────────────────────────────────────
function buildLives() {
  livesRowEl.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const h = document.createElement('div');
    h.className = 'heart' + (i >= lives ? ' lost' : '');
    h.textContent = '❤️';
    livesRowEl.appendChild(h);
  }
}

// ── Q DOTS ───────────────────────────────────────────────
function buildQDots() {
  qDotsEl.innerHTML = '';
  LEVELS[curLevel].rounds.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'qdot' + (i === curRound ? ' active' : '');
    qDotsEl.appendChild(d);
  });
}
function updateQDot(idx, state) {
  const dots = qDotsEl.querySelectorAll('.qdot');
  if (dots[idx])   dots[idx].className   = 'qdot ' + (state === 'ok' ? 'done' : 'wrong-dot');
  if (dots[idx+1]) dots[idx+1].className = 'qdot active';
}

// ── LAYOUT ───────────────────────────────────────────────
// Platform positions as % of gameArea (left-center-x, top)
const PLAT_POS_PCT = [
  {x: 16, y:  8},
  {x: 72, y:  6},
  {x: 74, y: 52},
  {x: 16, y: 54},
];
const START_POS_PCT = {x: 45, y: 76};

function layoutGame() {
  const aW = gameAreaEl.offsetWidth;
  const aH = gameAreaEl.offsetHeight;

  PLAT_POS_PCT.forEach((pos, i) => {
    const pxL = (aW * pos.x / 100);
    const pxT = (aH * pos.y / 100);
    platEls[i].style.left = pxL + 'px';
    platEls[i].style.top  = pxT + 'px';
  });

  const sL = (aW * START_POS_PCT.x / 100);
  const sT = (aH * START_POS_PCT.y / 100);
  startPlatEl.style.left = sL + 'px';
  startPlatEl.style.top  = sT + 'px';

  // Monster starts above start platform
  monCX = sL;
  monCY = sT;  // top of start platform
  posMonster(monCX, monCY);
}

function posMonster(cx, topY) {
  monCX = cx;
  monCY = topY;
  monsterEl.style.left      = (cx - MONSTER_W / 2) + 'px';
  monsterEl.style.top       = (topY - MONSTER_H)   + 'px';
  monsterEl.style.transform = '';
}

// ── RENDER ROUND ─────────────────────────────────────────
function renderRound() {
  const lv    = LEVELS[curLevel];
  const round = lv.rounds[curRound];

  levelLabelEl.textContent = lv.label;
  promptEmojiEl.textContent = round.emoji;
  promptHintEl.textContent  = round.hint;

  // Shuffle choices into platform faces
  const shuffled = [...round.choices].sort(() => Math.random() - 0.5);
  shuffled.forEach((word, i) => {
    pfEls[i].textContent  = word;
    pfEls[i].style.color  = '#fff';
    pfEls[i].style.filter = '';
    platEls[i].classList.remove('correct','wrong');
    platEls[i].style.pointerEvents = 'auto';
    platEls[i].style.opacity = '1';
  });

  // Progress
  const done = LEVELS.slice(0, curLevel).reduce((s,l) => s + l.rounds.length, 0) + curRound;
  progressEl.style.width = (done / totalRounds * 100) + '%';

  locked = false;
}

// ── CLICK HANDLER ────────────────────────────────────────
platEls.forEach((platEl, i) => {
  platEl.addEventListener('click', () => handleClick(i));
});

function handleClick(i) {
  if (locked) return;
  locked = true;
  platEls.forEach(p => { p.style.pointerEvents = 'none'; });

  const round   = LEVELS[curLevel].rounds[curRound];
  const clicked = pfEls[i].textContent;
  const correct = clicked === round.answer;

  // Get pixel coords for jump target (relative to gameArea)
  const aRect = gameAreaEl.getBoundingClientRect();
  const pRect = pfEls[i].getBoundingClientRect();
  const targetCX = pRect.left - aRect.left + pRect.width / 2;
  const targetTY = pRect.top  - aRect.top;  // top of platform face

  jumpTo(targetCX, targetTY, () => {
    if (correct) {
      onCorrect(i);
    } else {
      onWrong(i, round.answer);
    }
  });
}

// ── JUMP ANIMATION ────────────────────────────────────────
function jumpTo(endCX, endTY, cb) {
  const startCX = monCX, startTY = monCY;
  const dur  = 480;
  const t0   = performance.now();
  const dist = Math.hypot(endCX - startCX, endTY - startTY);
  const arc  = Math.min(90 + dist * 0.15, 180);

  function frame(now) {
    const t    = Math.min((now - t0) / dur, 1);
    const ease = t < 0.5 ? 2*t*t : -1 + (4-2*t)*t;
    const cx   = startCX + (endCX - startCX) * ease;
    const arcY = Math.sin(t * Math.PI) * -arc;
    const ty   = startTY + (endTY - startTY) * ease + arcY;
    const rot  = Math.sin(t * Math.PI) * 18 * Math.sign(endCX - startCX || 1);

    monsterEl.style.left      = (cx - MONSTER_W / 2) + 'px';
    monsterEl.style.top       = (ty - MONSTER_H)     + 'px';
    monsterEl.style.transform = `rotate(${rot}deg) scaleX(${endCX < startCX ? -1 : 1})`;

    if (t < 1) requestAnimationFrame(frame);
    else {
      monCX = endCX; monCY = endTY;
      monsterEl.style.transform = `scaleX(${endCX < startCX ? -1 : 1})`;
      cb();
    }
  }
  requestAnimationFrame(frame);
}

// ── CORRECT ──────────────────────────────────────────────
function onCorrect(i) {
  score += 10 + combo * 5;
  combo++;
  bestCombo = Math.max(bestCombo, combo);
  correctCount++;
  scoreEl.textContent = score;

  platEls[i].classList.add('correct');
  showToast('⭐ ' + (combo >= 3 ? combo + '× Combo!' : 'Correct!'), 't-ok');
  spawnParticles(pfEls[i], ['⭐','✨','💫','🌟','🎉']);

  updateQDot(curRound, 'ok');
  setTimeout(advanceRound, 850);
}

// ── WRONG ─────────────────────────────────────────────────
function onWrong(i, answer) {
  lives--; combo = 0;
  buildLives();

  platEls[i].classList.add('wrong');
  showToast('Try again! 💪', 't-ng');

  // Highlight correct
  pfEls.forEach((pf, j) => {
    if (pf.textContent === answer) {
      setTimeout(() => {
        pf.style.filter = 'brightness(1.9) drop-shadow(0 0 16px #4fffb0)';
      }, 350);
    }
  });

  updateQDot(curRound, 'ng');

  // Jump back to start platform
  const aRect = gameAreaEl.getBoundingClientRect();
  const sRect = document.getElementById('startFace').getBoundingClientRect();
  const sCX   = sRect.left - aRect.left + sRect.width  / 2;
  const sTY   = sRect.top  - aRect.top;

  if (lives <= 0) {
    setTimeout(endGame, 1100);
  } else {
    setTimeout(() => {
      jumpTo(sCX, sTY, () => {
        platEls.forEach(p => {
          p.style.pointerEvents = 'auto';
          p.classList.remove('correct', 'wrong');
        });
        pfEls.forEach(pf => { pf.style.filter = ''; });
        locked = false;
      });
    }, 700);
  }
}

// ── ADVANCE ──────────────────────────────────────────────
function advanceRound() {
  curRound++;
  const lv = LEVELS[curLevel];

  if (curRound >= lv.rounds.length) {
    curLevel++;
    if (curLevel >= LEVELS.length) {
      endGame();
      return;
    }
    curRound = 0;
    showToast('🚀 Level ' + (curLevel + 1) + '!', 't-ok');
  }

  // Return to start platform then load new round
  const aRect = gameAreaEl.getBoundingClientRect();
  const sRect = document.getElementById('startFace').getBoundingClientRect();
  const sCX   = sRect.left - aRect.left + sRect.width  / 2;
  const sTY   = sRect.top  - aRect.top;

  jumpTo(sCX, sTY, () => {
    monsterEl.style.transform = '';
    buildQDots();
    renderRound();
  });
}

// ── END ───────────────────────────────────────────────────
function endGame() {
  const pct = Math.round(correctCount / totalRounds * 100);
  document.getElementById('resultMon').textContent  = pct >= 80 ? '🏆' : pct >= 50 ? '😊' : '💪';
  document.getElementById('resultTitle').textContent = pct >= 80 ? 'Amazing!' : pct >= 50 ? 'Great Job!' : 'Keep Going!';
  document.getElementById('finalScore').textContent   = score;
  document.getElementById('finalCorrect').textContent = correctCount + '/' + totalRounds;
  document.getElementById('finalCombo').textContent   = bestCombo;

  progressEl.style.width = '100%';
  showScreen('resultScreen');

  // Confetti
  for (let k = 0; k < 28; k++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = ['🌟','⭐','✨','💫','🎉','🏆','💥','🌸'][Math.floor(Math.random()*8)];
      p.style.setProperty('--dx', (Math.random()-0.5)*300 + 'px');
      p.style.setProperty('--dy', (-80 - Math.random()*160) + 'px');
      p.style.left     = (20 + Math.random()*60) + 'vw';
      p.style.top      = (30 + Math.random()*40) + 'vh';
      p.style.fontSize = (14 + Math.random()*18) + 'px';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1000);
    }, k * 65);
  }
}

// ── TOAST ─────────────────────────────────────────────────
let toastTimer;
function showToast(msg, cls) {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.className   = 'show ' + cls;
  toastTimer = setTimeout(() => { toastEl.className = ''; }, 900);
}

// ── PARTICLES ─────────────────────────────────────────────
function spawnParticles(el, emojis) {
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width  / 2;
  const cy = r.top  + r.height / 2;
  for (let i = 0; i < 9; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = (Math.PI * 2 / 9) * i + Math.random() * 0.5;
    const dist  = 60 + Math.random() * 80;
    p.style.setProperty('--dx', (Math.cos(angle) * dist) + 'px');
    p.style.setProperty('--dy', (Math.sin(angle) * dist - 60) + 'px');
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    p.style.animationDelay = (Math.random() * 0.15) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1100);
  }
}

// Re-layout on resize
window.addEventListener('resize', () => {
  if (!gameScreen.classList.contains('hidden')) layoutGame();
});
</script>
